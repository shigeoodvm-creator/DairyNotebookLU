// ─── HATCH MAP VIEW ───────────────────────────────
const renderHatchMap=()=>{
  const fid=DB.activeId();const farm=DB.getFarm(fid);
  if(!fid||!farm){renderHome();return;}
  const hutches=HutchUtil.get(fid);

  if(!hutches.length){
    setView(`
    <div class="page-hd">
      <div class="page-title">🏠 ハッチマップ</div>
      <div class="page-sub">${h(farm.name)}</div>
    </div>
    <div class="card">
      <div class="card-body">
        <div class="empty">
          <div class="empty-icon">🏠</div>
          <h3>ハッチが設定されていません</h3>
          <p>農場のハッチ（子牛舎）の配置を登録すると、スコアのヒートマップと時系列追跡ができます。</p>
          <button class="btn-primary" style="margin-top:16px" onclick="App.openHutchSetup()">ハッチを設定する</button>
        </div>
      </div>
    </div>`);
    return;
  }

  // 日付決定
  const dates=HutchUtil.scanDates(fid);
  if(!HM.date) HM.date=dates.length?dates[dates.length-1]:today();
  const viewDate=HM.date;
  const dateIdx=dates.indexOf(viewDate);

  // 列ごとにハッチをグループ化（フリップ対応）
  const {cols}=HutchUtil.gridSize(hutches);
  let byCols=[];
  for(let c=0;c<cols;c++){
    const col=hutches.filter(h=>h.col===c).sort((a,b)=>a.row-b.row);
    byCols.push(HM.flipV ? col.slice().reverse() : col);
  }
  if(HM.flipH) byCols=byCols.slice().reverse();

  // 各ハッチの占有状態を取得
  const occ={};
  hutches.forEach(ht=>{occ[ht.id]=HutchUtil.occupant(fid,ht.id,viewDate);});

  // ハッチセルHTML生成
  const cellHtml=(ht)=>{
    const o=occ[ht.id];
    if(!o) return `<div class="hm-cell hm-cell-empty" onclick="App.focusHutch('${ht.id}',this)" data-hid="${ht.id}" ${HM.focusHutch===ht.id?'class="hm-cell hm-cell-empty hm-active"':''}>
      <div class="hm-cell-no">${h(ht.label)}</div>
      <div class="hm-cell-tag" style="font-size:11px;font-family:inherit;color:var(--text-4)">空ハッチ</div>
    </div>`;
    const sc=o.scan;const tag拡4=get拡4(sc.tagId)||sc.tagId.slice(-4);
    const bd=o.animal?.birthDate;
    const infoLine=bd?`${fmtDate(bd)}・${calcAge(bd,viewDate)}日齢`:'生年月日 未登録';
    return `<div class="hm-cell hm-s${sc.obScore}${HM.focusHutch===ht.id?' hm-active':''}" onclick="App.focusHutch('${ht.id}',this)" data-hid="${ht.id}">
      <div class="hm-cell-no">${h(ht.label)}</div>
      <div class="hm-cell-score">${sc.obScore}</div>
      <div class="hm-cell-tag">${tag拡4}</div>
      <div class="hm-cell-info">${infoLine}</div>
    </div>`;
  };

  // 詳細パネル HTML
  const detailHtml=()=>{
    if(!HM.focusHutch) return '';
    const ht=hutches.find(h=>h.id===HM.focusHutch);if(!ht)return'';
    const hist=HutchUtil.history(fid,HM.focusHutch);
    const animals=DB.getAnimals(fid);
    const tlItems=hist.map(g=>{
      const a=animals.find(x=>x.id===g.animalId);
      const name=a?get拡4(a.tagId)||a.tagId:g.tagId;
      const isCurrent=g.to===hist[hist.length-1]?.to&&g.animalId===hist[hist.length-1]?.animalId;
      const moves=HutchUtil.animalMoves(fid,g.animalId);
      const moveStr=moves.length>1?moves.map(m=>h(m.hutchLabel)).join(' → '):'';
      return `<div class="hm-tl-item${isCurrent?' '+'':''}">
        <div>
          <div class="hm-tl-date">${fmtDate(g.from)}${g.from!==g.to?` ～ ${fmtDate(g.to)}`:''}</div>
          <div style="font-size:10px;color:var(--text-4);margin-top:1px">${g.scans.length}回スキャン</div>
          ${moveStr?`<div style="font-size:10px;color:var(--blue);margin-top:2px">移動: ${moveStr}</div>`:''}
        </div>
        <div>
          <div class="hm-tl-tag">${name}</div>
          ${a?.breed?`<div style="font-size:10px;color:var(--text-3)">${h(a.breed)}</div>`:''}
        </div>
        <div style="text-align:right">
          <span class="score-badge ${scClass(g.lastScore)}" style="font-size:13px;width:26px;height:26px">${g.lastScore}</span>
          ${isCurrent?'<div style="font-size:10px;color:var(--teal);margin-top:2px">在舎中</div>':'<div style="font-size:10px;color:var(--text-4);margin-top:2px">退去</div>'}
        </div>
      </div>`;
    }).join('');

    // ハッチのスコア推移（全スキャンのスコアを時系列で）
    const allScans=DB.getScans(fid).filter(s=>s.hutchId===HM.focusHutch).sort((a,b)=>a.scanDate.localeCompare(b.scanDate));
    const sparkDots=allScans.map(s=>`<div class="hm-tl-dot" style="background:${['#10b981','#3b82f6','#f59e0b','#f97316','#ef4444','#7f1d1d'][s.obScore]}" title="${fmtDate(s.scanDate)} スコア${s.obScore}"></div>`).join('');

    return `<div class="hm-detail">
      <div class="hm-detail-hd">
        🏠 ${h(ht.label)} の記録履歴
        ${allScans.length?`<div style="display:flex;align-items:center;gap:3px;margin-left:auto;font-size:11px;color:var(--text-3)">スコア推移: ${sparkDots}</div>`:''}
        <button class="btn-sm btn-ghost" style="margin-left:8px" onclick="App.focusHutch(null)">×</button>
      </div>
      ${hist.length===0
        ?`<div class="hm-no-data">このハッチにはまだスキャン記録がありません</div>`
        :`<div class="hm-timeline">${tlItems}</div>`}
    </div>`;

// HUTCH SETUP MODAL
const renderHutchSetupModal=(fid)=>{
  if(!fid) return;
  const farm=DB.getFarm(fid);if(!farm)return;
  const current=farm.hutches||[];
  const hasCustom=current.some(h=>h.col>1);
  const mode=farm.hutchMode||'standard';

  // 標準モード：プレビュー生成用
  const previewHtml=(leftN,rightN,lbl0,lbl1)=>{
    const lh=[]; const rh=[];
    for(let i=0;i<Math.min(leftN,8);i++) lh.push(`<div class="hutch-preview-cell">${lbl0}-${i+1}</div>`);
    for(let i=0;i<Math.min(rightN,8);i++) rh.push(`<div class="hutch-preview-cell">${lbl1}-${i+1}</div>`);
    return `<div class="hutch-preview-col"><div class="hutch-preview-col-hd">${lbl0}</div>${lh.join('')}${leftN>8?`<div style="font-size:10px;color:var(--text-4);text-align:center">...他${leftN-8}個</div>`:''}</div>
            <div class="hutch-preview-col"><div class="hutch-preview-col-hd">${lbl1}</div>${rh.join('')}${rightN>8?`<div style="font-size:10px;color:var(--text-4);text-align:center">...他${rightN-8}個</div>`:''}</div>`;
  };

  // カスタムモード：既存ハッチ一覧テーブル
  const customRows=current.map(ht=>`<tr>
    <td><input value="${h(ht.label)}" onchange="App._hcLabelChange('${ht.id}',this.value)" style="width:90px"></td>
    <td><input type="number" min="0" max="9" value="${ht.col}" onchange="App._hcColChange('${ht.id}',parseInt(this.value))" style="width:48px"></td>
    <td><input type="number" min="0" max="99" value="${ht.row}" onchange="App._hcRowChange('${ht.id}',parseInt(this.value))" style="width:48px"></td>
    <td><button class="btn-sm btn-danger" onclick="App._hcDel('${ht.id}')">削除</button></td>
  </tr>`).join('');

  const bg=$('modal-bg');bg.style.display='flex';
  bg.innerHTML=`<div class="modal" style="max-width:540px">
    <div class="modal-hd">
      <div class="modal-title">🏠 ハッチ設定 ─ ${h(farm.name)}</div>
      <button class="modal-x" onclick="App.closeModal()">×</button>
    </div>
    <div class="modal-body">

      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="btn-outline${mode==='standard'?' btn-primary':''}" onclick="App._hcMode('standard')" style="${mode==='standard'?'background:var(--navy);color:#fff;border-color:var(--navy)':''}">
          標準（左右列）
        </button>
        <button class="btn-outline${mode==='custom'?' btn-primary':''}" onclick="App._hcMode('custom')" style="${mode==='custom'?'background:var(--navy);color:#fff;border-color:var(--navy)':''}">
          カスタム（自由配置）
        </button>
      </div>

      <div id="hc-standard" style="display:${mode==='standard'?'block':'none'}">
        <div class="hutch-setup-grid">
          <div class="form-group"><label class="form-label">左列のラベル</label>
            <input class="form-input" id="hc-lbl0" value="${h(farm.hutchColLabels?.[0]||'左列')}" oninput="App._hcPreview()"></div>
          <div class="form-group"><label class="form-label">右列のラベル</label>
            <input class="form-input" id="hc-lbl1" value="${h(farm.hutchColLabels?.[1]||'右列')}" oninput="App._hcPreview()"></div>
          <div class="form-group"><label class="form-label">左列のハッチ数</label>
            <input class="form-input" id="hc-ln" type="number" min="0" max="30" value="${current.filter(h=>h.col===0).length||6}" oninput="App._hcPreview()"></div>
          <div class="form-group"><label class="form-label">右列のハッチ数</label>
            <input class="form-input" id="hc-rn" type="number" min="0" max="30" value="${current.filter(h=>h.col===1).length||6}" oninput="App._hcPreview()"></div>
        </div>
        <div style="font-size:12px;color:var(--text-3);margin-bottom:8px">プレビュー</div>
        <div class="hutch-preview" id="hc-preview">
          ${previewHtml(current.filter(h=>h.col===0).length||6, current.filter(h=>h.col===1).length||6,
            farm.hutchColLabels?.[0]||'左列', farm.hutchColLabels?.[1]||'右列')}
        </div>
        <div class="callout cl-amber" style="margin-top:12px">
          <div class="callout-i">⚠️</div>
          <div style="font-size:12px">設定を適用すると既存のハッチ割り当て（スキャンの hutchId）は保持されますが、削除されたハッチのIDは解放されます。</div>
        </div>
        <div style="display:flex;justify-content:flex-end;margin-top:14px">
          <button class="btn-primary" onclick="App.applyStandardHutch()">✓ 標準レイアウトを適用</button>
        </div>
      </div>

      <div id="hc-custom" style="display:${mode==='custom'?'block':'none'}">
        <div style="font-size:12px;color:var(--text-3);margin-bottom:6px">
          列（col）と行（row）の番号でハッチの位置を指定します。<br>
          左列 = col 0、右列 = col 1、追加列 = col 2, 3... 行は0から始まる順番です。
        </div>
        <table class="hutch-custom-tbl">
          <thead><tr><th>ラベル</th><th>列(col)</th><th>行(row)</th><th></th></tr></thead>
          <tbody id="hc-tbody">${customRows}</tbody>
        </table>
        <button class="btn-outline" style="margin-top:10px;width:100%" onclick="App._hcAddRow()">＋ ハッチを追加</button>
        <div style="display:flex;justify-content:flex-end;margin-top:14px">
          <button class="btn-primary" onclick="App.applyCustomHutch()">✓ カスタムレイアウトを適用</button>
        </div>
      </div>

    </div>
  </div>`;
};

  downloadCsvTemplate(){
    const bom='\uFEFF';
    const csv=bom+'耳標番号,生年月日,品種,性別\r\n1234567890,2024-03-15,ホルスタイン,F\r\n0987654321,2024-04-02,ホルスタイン,F\r\n';
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);const a=document.createElement('a');
    a.href=url;a.download='個体登録テンプレート.csv';a.click();URL.revokeObjectURL(url);

  importAnimalCsv(file){
    const doParse=txt=>{
      const fid=DB.activeId();if(!fid){toast('農場を選択してください','err');return;}
      const lines=txt.replace(/\r/g,'').split('\n').map(l=>l.trim()).filter(l=>l);
      let added=0,skipped=0,errors=0;
      const startIdx=/^\d{10}/.test(lines[0])?0:1;
      for(let i=startIdx;i<lines.length;i++){
        const cols=lines[i].split(',').map(s=>s.trim().replace(/^["']|["']$/g,''));
        const tagId=cols[0]?.replace(/\D/g,'')||'';
        if(tagId.length!==10){errors++;continue;}
        if(DB.findByTag(fid,tagId)){skipped++;continue;}
        const birthDate=cols[1]||'';const breed=cols[2]||'';const rawSex=(cols[3]||'').toUpperCase();
        const sex=rawSex==='F'||rawSex==='雌'?'F':rawSex==='M'||rawSex==='雄'?'M':'';
        DB.upsertAnimal(fid,tagId,{birthDate,breed,sex});added++;
      }
      toast(`${added}頭を登録しました（スキップ:${skipped}件、エラー:${errors}件）`,'ok');
      renderAnimals();
    };
    const r=new FileReader();
    r.onload=e=>{
      const txt=e.target.result;
      if(txt.includes('\uFFFD')){
        const r2=new FileReader();r2.onload=e2=>doParse(e2.target.result);r2.readAsText(file,'shift-jis');
      } else {
        doParse(txt);
      }
    };
    r.readAsText(file,'utf-8');
  },

  hmFlipFix(){
    if(!HM.flipH&&!HM.flipV) return;
    const fid=DB.activeId();const farm=DB.getFarm(fid);
    if(!farm||!farm.hutches?.length) return;
    const desc=(HM.flipH&&HM.flipV)?'左右・前後反転':HM.flipH?'左右反転':'前後反転';
    if(!confirm(`現在の表示向き（${desc}）をデータに確定します。\nハッチの配置情報が永続的に書き換えられます。続けますか？`)) return;
    const hutches=farm.hutches;
    const maxCol=Math.max(...hutches.map(h=>h.col));
    const maxRow=Math.max(...hutches.map(h=>h.row));
    const nextHutches=hutches.map(h=>({
      ...h,
      col:HM.flipH?maxCol-h.col:h.col,
      row:HM.flipV?maxRow-h.row:h.row,
    }));

    // 標準レイアウトは向き確定後に列/行の順でラベルを再採番して表示を一致させる
    if((farm.hutchMode||'standard')==='standard'){
      const colGroups={};
      nextHutches.forEach(ht=>{
        if(!colGroups[ht.col]) colGroups[ht.col]=[];
        colGroups[ht.col].push(ht);
      });
      Object.entries(colGroups).forEach(([col,list])=>{
        const colNum=Number(col);
        const base=HutchUtil.colLabel(farm,colNum);
        list
          .sort((a,b)=>a.row-b.row)
          .forEach((ht,idx)=>{ ht.label=`${base}-${idx+1}`; });
      });
    }
    farm.hutches=nextHutches;
    DB.saveFarm(farm);
    HM.flipH=false;HM.flipV=false;
    renderHatchMap();
  },

    farm.hutches=newH;farm.hutchColLabels={0:lbl0,1:lbl1};farm.hutchMode='standard';
    DB.saveFarm(farm);
    this.closeModal();toast(`ハッチを設定しました（左${ln}個 / 右${rn}個）`,'ok');
    HM.focusHutch=null;renderHatchMap();
  },
  _hcAddRow(){
    const fid=DB.activeId();const farm=DB.getFarm(fid);if(!farm)return;
    const hutches=farm.hutches||[];
    const maxRow=hutches.length?Math.max(...hutches.map(h=>h.row)):-1;
    const ht={id:genId(),label:`ハッチ${hutches.length+1}`,col:0,row:maxRow+1};
    farm.hutches=[...hutches,ht];DB.saveFarm(farm);
    const tbody=$('hc-tbody');if(!tbody)return;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><input value="${h(ht.label)}" onchange="App._hcLabelChange('${ht.id}',this.value)" style="width:90px"></td>
      <td><input type="number" min="0" max="9" value="${ht.col}" onchange="App._hcColChange('${ht.id}',parseInt(this.value))" style="width:48px"></td>
      <td><input type="number" min="0" max="99" value="${ht.row}" onchange="App._hcRowChange('${ht.id}',parseInt(this.value))" style="width:48px"></td>
      <td><button class="btn-sm btn-danger" onclick="App._hcDel('${ht.id}')">削除</button></td>`;
    tbody.appendChild(tr);
  },
  _hcLabelChange(id,val){
    const fid=DB.activeId();const farm=DB.getFarm(fid);if(!farm)return;
    const h=farm.hutches?.find(x=>x.id===id);if(h){h.label=val;DB.saveFarm(farm);}
  },
  _hcColChange(id,val){
    const fid=DB.activeId();const farm=DB.getFarm(fid);if(!farm)return;
    const ht=farm.hutches?.find(x=>x.id===id);if(ht){ht.col=isNaN(val)?0:val;DB.saveFarm(farm);}
  },
  _hcRowChange(id,val){
    const fid=DB.activeId();const farm=DB.getFarm(fid);if(!farm)return;
    const ht=farm.hutches?.find(x=>x.id===id);if(ht){ht.row=isNaN(val)?0:val;DB.saveFarm(farm);}
  },
  _hcDel(id){
    const fid=DB.activeId();const farm=DB.getFarm(fid);if(!farm)return;
    farm.hutches=(farm.hutches||[]).filter(x=>x.id!==id);DB.saveFarm(farm);
    const row=document.querySelector(`[onclick*="${id}"]`)?.closest('tr');if(row)row.remove();
  },
  applyCustomHutch(){
    const fid=DB.activeId();const farm=DB.getFarm(fid);if(!farm)return;
    farm.hutchMode='custom';DB.saveFarm(farm);
    this.closeModal();toast('カスタムレイアウトを保存しました','ok');
    HM.focusHutch=null;renderHatchMap();
  },

  // Scan form
  onExp4(v){
    const fid=DB.activeId();if(!fid)return;
    v=v.replace(/\D/g,'').slice(0,4);
    const el=$('f-exp4');if(el)el.value=v;
    SS.exp4=v;
    const hint=$('exp4-hint');const tagWrap=$('tag-wrap');
    if(v.length<4){if(hint)hint.innerHTML='';return;}
    const matched=DB.getAnimals(fid).filter(a=>get拡4(a.tagId)===v);
    const msg=$('tag-wrap-msg');
    if(matched.length===1){
      const a=matched[0];
      const tagEl=$('f-tag');if(tagEl)tagEl.value=a.tagId;
      if(tagWrap)tagWrap.style.display='none';
      if(msg)msg.innerHTML='';
      if(hint)hint.innerHTML=`<span style="color:var(--teal);font-weight:600">✓ ${fmtTagId(a.tagId)}　${a.breed||'品種未設定'}</span>`;
      this.onTag(a.tagId,false);
    } else if(matched.length>1){
      if(msg)msg.innerHTML=`<div style="background:var(--amber-lt);border:1.5px solid var(--amber);border-radius:8px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px"><span style="font-size:18px">⚠️</span><div><div style="font-weight:700;color:var(--amber);font-size:13px">${matched.length}頭がヒットしました</div><div style="font-size:12px;color:var(--text-2);margin-top:2px">個体識別番号（10桁）を入力して絞り込んでください</div></div></div>`;
      if(tagWrap)tagWrap.style.display='block';
      if(hint)hint.innerHTML=`<span style="color:var(--amber);font-weight:600">⚠ ${matched.length}頭ヒット → 10桁で絞り込み</span>`;
      setTimeout(()=>{const tagEl=$('f-tag');if(tagEl){tagEl.focus();tagEl.style.borderColor='var(--amber)';}tagWrap?.scrollIntoView({behavior:'smooth',block:'nearest'});},50);
    } else {
      if(msg)msg.innerHTML=`<div style="background:#fff3cd;border:2px solid var(--amber);border-radius:8px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:flex-start;gap:12px"><span style="font-size:22px;line-height:1">🆕</span><div><div style="font-weight:800;color:var(--amber);font-size:14px;margin-bottom:4px">新規個体の登録</div><div style="font-size:13px;color:var(--text-2)">この拡大4桁（<strong>${v}</strong>）は未登録です。<br>個体識別番号（<strong>10桁</strong>）を下に入力してください。</div></div></div>`;
      if(tagWrap)tagWrap.style.display='block';
      if(hint)hint.innerHTML=`<span style="color:var(--amber);font-weight:700">🆕 未登録 → 10桁を入力してください</span>`;
      setTimeout(()=>{const tagEl=$('f-tag');if(tagEl){tagEl.focus();tagEl.style.borderColor='var(--amber)';tagEl.style.boxShadow='0 0 0 3px rgba(180,83,9,.15)';}tagWrap?.scrollIntoView({behavior:'smooth',block:'nearest'});},50);
    }
  },
  onTag(tag,silent=false){
    const fid=DB.activeId();if(!fid||!tag.trim())return;
    // 10桁入力開始時にオレンジ枠をリセット
    const tagEl=$('f-tag');if(tagEl){tagEl.style.borderColor='';tagEl.style.boxShadow='';}
    const a=DB.findByTag(fid,tag.trim());
    const hint=$('tag-hint');const naa=$('new-animal-area');
    if(a){
      if(hint)hint.innerHTML=`<span style="color:var(--teal)">✓ 登録済み　${fmtTagId(a.tagId)}　拡大4桁：<strong>${get拡4(a.tagId)}</strong>　${a.breed||'品種未設定'}</span>`;
      if(naa)naa.style.display='none';
      if(a.birthDate){const ageEl=$('f-age');const dateEl=$('f-date');if(ageEl&&dateEl&&!ageEl.value)ageEl.value=calcAge(a.birthDate,dateEl.value);}
      const prev=DB.byAnimal(fid,a.id);const re=$('f-round');if(re&&!SS.editId)re.value=prev.length+1;
      if(!SS.editId&&!silent){
        const lh=HutchUtil.lastHutchFromScans(fid,a.id);
        const sel=$('f-hutch-sel');const free=$('f-hutch-free');
        if(sel){
          if(lh&&lh.hutchId&&[...sel.options].some(o=>o.value===lh.hutchId)) sel.value=lh.hutchId;
          else sel.value='';
        }
        if(free) free.value=(lh&&lh.hutchFree)?lh.hutchFree:'';
      }
    }else{
      if(hint)hint.innerHTML=`<span style="color:var(--text-3)">新規個体として登録されます</span>`;
      if(naa)naa.style.display='block';
    }
  },
  onDateCh(){const tag=$('f-tag')?.value;if(tag)this.onTag(tag,true);},
  onBd(){const bd=$('f-bd')?.value;const sd=$('f-date')?.value||today();const ael=$('f-age');if(bd&&ael)ael.value=calcAge(bd,sd);},
  onTreat(v){const da=$('drug-area');if(da)da.style.display=v?'grid':'none';},
  onScore(v){
    SS.score=parseInt(v)||0;
    const sl=$('f-score');if(sl)sl.value=SS.score;
    const pill=$('score-pill');const desc=$('score-desc');const tb=$('treat-badge');
    if(pill){pill.textContent=SS.score;pill.style.background=SC[SS.score];}
    if(desc)desc.textContent=`スコア ${SS.score}：${SLBL[SS.score]}　／　対応：${SACT[SS.score]}`;
    if(tb){tb.textContent=SS.score>=2?'スコア≥2：治療推奨':'スコア<2：観察';tb.className='badge '+(SS.score>=2?'b-amber':'b-teal');}
  },
  updateAutoSc(){
    const sg=Calc.suggest(SS.right,SS.left);
    const el=$('auto-sc');if(el)el.textContent=`スコア ${sg}（${SLBL[sg]}）`;
    SS.score=sg;this.onScore(String(sg));
  },
  togFinding(btn){
    const side=btn.dataset.side,pos=btn.dataset.pos;
    const cur=side==='right'?SS.right[pos]:SS.left[pos];
    const next=FC[(FC.indexOf(cur)+1)%FC.length];
    if(side==='right')SS.right[pos]=next;else SS.left[pos]=next;
    Object.values(FSTATE).filter(c=>c).forEach(c=>btn.classList.remove(c));
    if(next)btn.classList.add(FSTATE[next]);
    btn.textContent=FBTN[next]||'未入力';
    this.updateAutoSc();
  },
  fillNormal(){
    RPOS.forEach(p=>SS.right[p]='A');LPOS.forEach(p=>SS.left[p]='A');
    document.querySelectorAll('.lung-btn').forEach(b=>{Object.values(FSTATE).filter(c=>c).forEach(c=>b.classList.remove(c));b.classList.add('st-n');b.textContent='正常';});this.updateAutoSc();
  },
  clearFindings(){
    RPOS.forEach(p=>SS.right[p]='');LPOS.forEach(p=>SS.left[p]='');
    document.querySelectorAll('.lung-btn').forEach(b=>{Object.values(FSTATE).filter(c=>c).forEach(c=>b.classList.remove(c));b.textContent='未入力';});this.updateAutoSc();
  },
  scanFormKeydown(e){
    if(e.key!=='Enter')return;
    const tag=e.target.tagName.toLowerCase();
    if(tag==='textarea'||e.target.type==='submit'||e.target.type==='button')return;
    e.preventDefault();
    const form=$('scan-form');if(!form)return;
    const focusable=Array.from(form.querySelectorAll('input:not([disabled]):not([type="hidden"]),select:not([disabled]),textarea:not([disabled])'));
    const idx=focusable.indexOf(e.target);
    if(idx>=0&&idx<focusable.length-1)focusable[idx+1].focus();
  },
  submitScan(e){
    e.preventDefault();const fid=DB.activeId();if(!fid){toast('農場を選択してください','err');return;}
    const tagId=($('f-tag')?.value||'').trim();const scanDate=$('f-date').value;
    const ageRaw=$('f-age').value.trim();const ageAtScan=ageRaw!==''?parseInt(ageRaw):null;const round=parseInt($('f-round').value)||1;
    const score=parseInt($('f-score').value)||0;
    if(!tagId){toast('個体が選択されていません。拡大4桁を入力してください','err');$('f-exp4')?.focus();return;}
    if(!scanDate){toast('スキャン日は必須です','err');return;}
    const animal=DB.upsertAnimal(fid,tagId,{...($('f-bd')?.value?{birthDate:$('f-bd').value}:{}),... ($('f-breed')?.value?{breed:$('f-breed').value}:{}),... ($('f-sex')?.value?{sex:$('f-sex').value}:{})});
    const hutchId=$('f-hutch-sel')?.value||'';
    const hutchFree=$('f-hutch-free')?.value.trim()||'';
    const scan={farmId:fid,animalId:animal.id,tagId,scanDate,ageAtScan,round,right:{...SS.right},left:{...SS.left},obScore:score,mainFindings:$('f-findings').value.trim(),treated:$('f-treated').checked,drug:$('f-drug')?.value.trim()||'',notes:$('f-notes').value.trim(),...(hutchId?{hutchId}:{}),...(hutchFree&&!hutchId?{hutchFree}:{})};
    if(SS.editId){scan.id=SS.editId;DB.updateScan(fid,scan);toast('記録を更新しました','ok');}
    else{DB.addScan(fid,scan);toast(`${tagId} のスキャンを保存しました（スコア ${score}）`,'ok');}
    // ハッチが指定されている場合、同個体の同日以降のスキャンに反映
    if(hutchId||hutchFree){
      const updScans=DB.getScans(fid).map(sc=>{
        if(sc.animalId!==animal.id||sc.id===scan.id||sc.scanDate<scanDate)return sc;
        const next={...sc};delete next.hutchId;delete next.hutchFree;
        if(hutchId)next.hutchId=hutchId;else next.hutchFree=hutchFree;
        return next;
      });
      DB.saveScans(fid,updScans);
    }
    if(scan.treated&&scan.drug)DrugFreq.inc(scan.drug);
    resetSS();Router.nav('/history');
  },
  editScan(sid){const fid=DB.activeId();if(!fid)return;const sc=DB.getScans(fid).find(s=>s.id===sid);if(!sc){toast('記録が見つかりません','err');return;}renderNewScan(sc);window.scrollTo(0,0);history.replaceState(null,'','#/scan/new');Router._hl('/scan/new');},
  delScan(sid){if(!confirm('削除しますか？'))return;const fid=DB.activeId();DB.delScan(fid,sid);toast('削除しました','warn');renderHistory();},
  delScanFromModal(sid,animalId){if(!confirm('このスキャン記録を削除しますか？'))return;const fid=DB.activeId();DB.delScan(fid,sid);toast('削除しました','warn');renderAnimalModal(fid,animalId);},
  saveAnimalHutch(animalId){
    const fid=DB.activeId();if(!fid)return;
    const hutchId=$('am-hutch-sel')?.value||'';
    const hutchFree=$('am-hutch-free')?.value.trim()||'';
    const updScans=DB.getScans(fid).map(s=>{
      if(s.animalId!==animalId)return s;
      const next={...s};delete next.hutchId;delete next.hutchFree;
      if(hutchId)next.hutchId=hutchId;else if(hutchFree)next.hutchFree=hutchFree;
      return next;
    });
    DB.saveScans(fid,updScans);
    toast('全スキャンのハッチを更新しました','ok');
    renderAnimalModal(fid,animalId);
  },
  setF(k,v){if(v===''||v===null||v===undefined)delete HS.f[k];else HS.f[k]=v;renderHistory();},
  clrF(){HS.f={};renderHistory();},
  sortH(col){if(HS.sort===col){HS.sortDir=(HS.sortDir+1)%3;if(HS.sortDir===0)HS.sort=null;}else{HS.sort=col;HS.sortDir=1;}renderHistory();},
  exportFarm(){
    const fid=DB.activeId();if(!fid){toast('農場を選択してください','err');return;}
    const json=DB.exportData(fid);if(!json)return;
    const farm=DB.getFarm(fid);const blob=new Blob([json],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`${farm.name}_${today()}.json`;a.click();URL.revokeObjectURL(url);toast('エクスポートしました','ok');
  },

  exportCSV(mode){
    // 対象農場を決定
    let targets=[];
    if(mode==='all'){
      targets=DB.getFarms();
      if(!targets.length){toast('データがありません','err');return;}
    } else {
      const fid=DB.activeId();if(!fid){toast('農場を選択してください','err');return;}
      const f=DB.getFarm(fid);if(!f)return;
      targets=[f];
    }

    // CSV ヘッダー
    const HDR=[
      '農場名','耳標番号（10桁）','拡大4桁','品種','性別','生年月日',
      '検査日','検査時日齢(日)','ハッチ',
      '右_前葉前部','右_前葉後部','右_中葉','右_後葉',
      '左_前葉前部','左_前葉後部','左_後葉',
      'OBスコア','主な所見','治療介入','薬剤','備考','ラウンド','記録作成日時'
    ];

    // 所見コードを日本語ラベルに変換（研究データ用）
    const fLbl={'':'','A':'正常','L':'線状Bライン','B':'帯状Bライン(コメット)','C':'局所コンソリデーション','D':'びまん性コンソリデーション','H':'肝変化','E':'胸水','P':'膿瘍'};
    const sexLbl={'F':'雌','M':'雄','':'不明'};

    // CSV 値のエスケープ（カンマ・改行・ダブルクォート対応）
    const esc=v=>{
      if(v==null)return '';
      const s=String(v);
      if(s.includes(',')||s.includes('"')||s.includes('\n'))return '"'+s.replace(/"/g,'""')+'"';
      return s;
    };

    const rows=[HDR.map(esc).join(',')];

    for(const farm of targets){
      const animalsMap=new Map(DB.getAnimals(farm.id).map(a=>[a.id,a]));
      const hutches=HutchUtil.get(farm.id);
      const hutchLabel=s=>s.hutchId?(hutches.find(h=>h.id===s.hutchId)?.label||s.hutchId):s.hutchFree||'';

      const scans=DB.getScans(farm.id).slice().sort((a,b)=>a.scanDate.localeCompare(b.scanDate));
      for(const s of scans){
        const an=animalsMap.get(s.animalId)||{};
        const row=[
          farm.name,
          s.tagId||'',
          get拡4(s.tagId||''),
          an.breed||'',
          sexLbl[an.sex||'']||'',
          an.birthDate||'',
          s.scanDate||'',
          s.ageAtScan!=null?s.ageAtScan:'',
          hutchLabel(s),
          fLbl[s.right?.rf_a||''],
          fLbl[s.right?.rf_p||''],
          fLbl[s.right?.r_m ||''],
          fLbl[s.right?.r_c ||''],
          fLbl[s.left?.lf_a ||''],
          fLbl[s.left?.lf_p ||''],
          fLbl[s.left?.l_c  ||''],
          s.obScore!=null?s.obScore:'',
          s.mainFindings||'',
          s.treated?'あり':'なし',
          s.drug||'',
          s.notes||'',
          s.round||1,
          s.createdAt||''
        ];
        rows.push(row.map(esc).join(','));
      }
    }

    // BOM付きUTF-8でExcelでも文字化けしないように出力
    const bom='\uFEFF';
    const csv=bom+rows.join('\r\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    const fname=mode==='all'?`DairyNotebook_全農場_${today()}.csv`:`${targets[0].name}_${today()}.csv`;
    a.download=fname;
    a.click();
    URL.revokeObjectURL(url);
    const total=rows.length-1;
    toast(`CSVエクスポート完了（${total}件）`,'ok');
  },
  importFarm(file){
    const r=new FileReader();
    r.onload=e=>{
      try{
        const text=e.target.result;
        const d=JSON.parse(text);
        if(!d.farm||!Array.isArray(d.scans)) throw new Error('フォーマットエラー');
        const baseName=d.farm.name||'農場';
        const farms=DB.getFarms();
        const existing=farms.find(f=>f.name===baseName);

        if(existing){
          const overwrite=confirm(`農場「${baseName}」はすでに存在します。\n\nOK：既存の記録をすべて置き換える\nキャンセル：別名としてインポートします`);
          if(overwrite){
            const fid=existing.id;
            const animals=d.animals||[];
            const scans=(d.scans||[]).map(s=>({...s,farmId:fid}));
            const farm={...existing,...d.farm,id:fid,name:existing.name,updatedAt:today()};
            DB.saveFarm(farm);DB.saveAnimals(fid,animals);DB.saveScans(fid,scans);
            DB.setActive(fid);updateTopBar();toast('インポートしました（上書き）','ok');Router.nav('/dashboard');return;
          }
        }

        let name=baseName;let n=1;
        while(DB.getFarms().some(f=>f.name===name)){n++;name=`${baseName}（${n}）`;}
        d.farm.name=name;
        const nid=DB.importData(JSON.stringify(d));
        DB.setActive(nid);updateTopBar();toast('インポートしました','ok');Router.nav('/dashboard');
      }catch(err){
        toast('インポート失敗：'+err.message,'err');
      }
    };
    r.readAsText(file);
  },
  init(){
    $('file-in').addEventListener('change',ev=>{if(ev.target.files[0])this.importFarm(ev.target.files[0]);ev.target.value='';});
    $('modal-bg').addEventListener('click',e=>{if(e.target===$('modal-bg'))this.closeModal();});
    // ファイル未設定でデータがある場合、閉じる前に警告
    window.addEventListener('beforeunload', e=>{
      if((!FileStore._handle || FileStore._needPermission) && DB.getFarms().length > 0){
        e.preventDefault();
        e.returnValue = 'ファイルが保存されていません。「💾 名前を付けて保存」でOneDriveに保存してから閉じてください。';
      }
    });
    Router.on('/dashboard',()=>renderDashboard());
    Router.on('/scan/new',()=>renderNewScan());
    Router.on('/animals',()=>renderAnimals());
    Router.on('/history',()=>renderHistory());
    Router.on('/followup',()=>renderFollowup());
    Router.on('/notes',()=>renderNotes());
    Router.on('/report',()=>renderReport());
    Router.on('/analysis',()=>renderAnalysis());
    Router.on('/guide',()=>renderGuide());
    Router.on('/hatch-map',()=>renderHatchMap());
    updateTopBar();Router.init();
    if(!DB.activeId()||!DB.getFarm(DB.activeId())){
      renderHome();
      // 農場が登録済みの場合のみ農場選択モーダルを自動表示
      // 農場が0件の場合はホーム画面でファイルを開く or 新規作成を選ばせる
      if(DB.getFarms().length > 0) setTimeout(()=>this.openFarmModal(),350);
    }
    // IndexedDB からファイルハンドルを復元（非同期）
    (async()=>{ await FileStore.tryRestore(); })();
  }
};
App.init();
// ドロップダウン外クリックで閉じる
document.addEventListener('click',e=>{if(!e.target.closest('.tb-menu'))App.closeMenus();});
</script>
