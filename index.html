<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DairyNotebookLU</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
/* ─────────────────────────────────────────
   Design Tokens
───────────────────────────────────────── */
:root {
  --bg:       #f0f2f5;
  --surface:  #ffffff;
  --border:   #e3e6ea;
  --border-2: #d1d5db;

  --navy:     #1a3a5c;
  --navy-2:   #0d2137;
  --blue:     #2e6fcc;
  --blue-lt:  #dbeafe;
  --teal:     #0f8c72;
  --teal-lt:  #d1fae5;
  --amber:    #b45309;
  --amber-lt: #fef3c7;
  --red:      #be2b2b;
  --red-lt:   #fee2e2;
  --gray:     #6b7280;
  --gray-lt:  #f3f4f6;

  --text:     #111827;
  --text-2:   #374151;
  --text-3:   #6b7280;
  --text-4:   #9ca3af;

  --radius:   12px;
  --radius-sm:8px;
  --shadow:   0 1px 4px rgba(0,0,0,.07), 0 2px 10px rgba(0,0,0,.04);
  --shadow-md:0 4px 18px rgba(0,0,0,.1);
  --tr:       .15s ease;

  /* Score colors */
  --s0:#10b981; --s1:#3b82f6; --s2:#f59e0b; --s3:#f97316; --s4:#ef4444; --s5:#7f1d1d;
  --sb0:#d1fae5;--sb1:#dbeafe;--sb2:#fef3c7;--sb3:#ffedd5;--sb4:#fee2e2;--sb5:#fecaca;
  /* Finding colors: 正常→線状B→帯状B→小コンソリ→局所C→びまんC→肝変化→胸水→膿瘍 */
  --fn:#10b981; --fl:#60a5fa; --fb:#3b82f6; --fs:#0d9488; --fc:#f59e0b; --fd:#c2410c; --fh:#b91c1c; --fe:#8b5cf6; --fa:#ef4444;
}

/* ─────────────────────────────────────────
   Reset & Base
───────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.65}
a{color:inherit;text-decoration:none}
button{cursor:pointer;font-family:inherit;font-size:14px}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* ─────────────────────────────────────────
   Top Navigation Bar
───────────────────────────────────────── */
#topbar {
  position:fixed;top:0;left:0;right:0;height:64px;z-index:200;
  background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 28px;gap:0;
}
.tb-brand {
  display:flex;align-items:center;gap:10px;margin-right:32px;flex-shrink:0;
}
.tb-logo {
  height:44px;width:auto;display:block;
}
.tb-brand-title {
  margin:0;font-size:26px;font-weight:700;color:#202124;letter-spacing:-.3px;white-space:nowrap;line-height:1;
}
.tb-abbr {
  color:var(--blue);
}

/* Farm switcher pill */
#farm-btn {
  display:flex;align-items:center;gap:7px;padding:6px 14px 6px 10px;
  border:1.5px solid var(--border-2);border-radius:20px;background:#fff;
  color:var(--text-2);font-size:13px;transition:var(--tr);margin-right:22px;flex-shrink:0;
  max-width:220px;
}
#farm-btn:hover{border-color:var(--blue);color:var(--blue)}
#farm-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--teal);flex-shrink:0}
#farm-btn .name{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#farm-btn .caret{font-size:9px;color:var(--text-4);flex-shrink:0}

/* Nav tabs */
.tb-tabs{display:flex;align-items:stretch;height:54px;gap:0}
.tb-tab {
  display:flex;align-items:center;padding:0 11px;font-size:12.5px;font-weight:500;
  color:var(--text-3);border:none;background:none;height:100%;position:relative;
  transition:var(--tr);white-space:nowrap;
}
.tb-tab:hover{color:var(--text)}
.tb-tab.active{color:var(--navy);font-weight:700}
.tb-tab.active::after{
  content:'';position:absolute;bottom:0;left:8px;right:8px;height:2.5px;
  background:var(--blue);border-radius:2px 2px 0 0;
}
/* データドロップダウン */
.tb-menu{position:relative}
.tb-menu-drop{
  display:none;position:absolute;top:calc(100% + 6px);right:0;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);box-shadow:var(--shadow-md);
  z-index:400;min-width:210px;padding:5px 0;
}
.tb-menu.open .tb-menu-drop{display:block}
.tb-menu-item{
  display:flex;align-items:center;gap:8px;width:100%;text-align:left;
  padding:9px 16px;border:none;background:none;
  font-size:13px;color:var(--text-2);cursor:pointer;transition:var(--tr);
}
.tb-menu-item:hover{background:var(--gray-lt);color:var(--navy)}
.tb-menu-sep{height:1px;background:var(--border);margin:4px 0}
/* ファイル同期ドット */
#file-dot{
  width:9px;height:9px;border-radius:50%;background:var(--border-2);
  flex-shrink:0;cursor:default;transition:.3s;
}
#file-dot.ok{background:var(--teal)}
#file-dot.warn{background:var(--amber);animation:pulse-dot 1.5s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}

.tb-spacer{flex:1}

.tb-actions{display:flex;align-items:center;gap:8px}
.btn-outline {
  padding:6px 14px;border:1.5px solid var(--border-2);border-radius:7px;
  background:#fff;color:var(--text-2);font-size:12.5px;font-weight:500;
  transition:var(--tr);white-space:nowrap;
}
.btn-outline:hover{border-color:var(--navy);color:var(--navy);background:var(--gray-lt)}
.btn-primary {
  padding:7px 16px;border:none;border-radius:7px;
  background:var(--navy);color:#fff;font-size:13px;font-weight:600;
  transition:var(--tr);white-space:nowrap;
}
.btn-primary:hover{background:var(--blue)}

/* ─────────────────────────────────────────
   Main Layout
───────────────────────────────────────── */
#main{margin-top:64px;min-height:calc(100vh - 64px)}
#view{max-width:940px;margin:0 auto;padding:32px 24px 60px}

/* ─────────────────────────────────────────
   Page header
───────────────────────────────────────── */
.page-hd{margin-bottom:24px}
.page-title{font-size:22px;font-weight:800;color:var(--navy-2);letter-spacing:-.4px;margin-bottom:3px}
.page-sub{font-size:13px;color:var(--text-3)}

/* ─────────────────────────────────────────
   Cards / Sections
───────────────────────────────────────── */
.card {
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);margin-bottom:16px;overflow:hidden;
}
.card-hd {
  display:flex;align-items:center;gap:10px;
  padding:16px 22px 14px;border-bottom:1px solid var(--border);
}
.card-hd-icon {
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;flex-shrink:0;
}
.card-hd-icon.blue{background:var(--blue-lt);color:var(--blue)}
.card-hd-icon.teal{background:var(--teal-lt);color:var(--teal)}
.card-hd-icon.amber{background:var(--amber-lt);color:var(--amber)}
.card-hd-icon.red{background:var(--red-lt);color:var(--red)}
.card-hd-title{font-size:14px;font-weight:700;color:var(--text)}
.card-hd-sub{font-size:12px;color:var(--text-3);margin-left:auto}
.card-body{padding:20px 22px}
.card-body.tight{padding:14px 22px}

/* ─────────────────────────────────────────
   KPI Grid
───────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:16px 18px;border-top:3px solid var(--border-2);
}
.kpi-card.blue{border-top-color:var(--blue)}
.kpi-card.teal{border-top-color:var(--teal)}
.kpi-card.amber{border-top-color:var(--amber)}
.kpi-card.red{border-top-color:var(--red)}
.kpi-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);margin-bottom:8px}
.kpi-val{font-size:28px;font-weight:800;color:var(--navy-2);line-height:1}
.kpi-unit{font-size:13px;font-weight:400;color:var(--text-3);margin-left:2px}
.kpi-note{font-size:11px;color:var(--text-3);margin-top:5px}

/* ─────────────────────────────────────────
   Charts
───────────────────────────────────────── */
.chart-row{display:grid;grid-template-columns:1fr 320px;gap:14px;margin-bottom:16px}
.chart-wrap{position:relative;height:210px}

/* ─────────────────────────────────────────
   Forms
───────────────────────────────────────── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px 20px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px 20px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
.form-label{font-size:12px;font-weight:700;color:var(--text-2);letter-spacing:.2px}
.form-label .req{color:var(--red);margin-left:2px}
.form-input,.form-select,.form-textarea{
  border:1.5px solid var(--border-2);border-radius:var(--radius-sm);
  padding:9px 12px;font-size:14px;color:var(--text);background:#fff;
  transition:var(--tr);outline:none;width:100%;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:var(--blue);box-shadow:0 0 0 3px rgba(46,111,204,.12);
}
.form-textarea{resize:vertical;min-height:72px}
.form-hint{font-size:11px;color:var(--text-3)}
.input-addon{display:flex;align-items:center;gap:0}
.input-addon .form-input{border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
.input-addon-text{padding:9px 12px;background:var(--gray-lt);border:1.5px solid var(--border-2);border-left:none;border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:13px;color:var(--text-3);white-space:nowrap}

/* ─────────────────────────────────────────
   Lung grid
───────────────────────────────────────── */
.lung-block{background:var(--bg);border:1px dashed var(--border-2);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.lung-block-title{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.lung-tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:10px;letter-spacing:.3px}
.lung-tag.right{background:var(--blue-lt);color:var(--blue)}
.lung-tag.left{background:var(--teal-lt);color:var(--teal)}
.lung-grid{display:grid;gap:8px}
.lung-grid.r4{grid-template-columns:repeat(4,1fr)}
.lung-grid.l3{grid-template-columns:repeat(3,1fr)}
.lung-cell{display:flex;flex-direction:column;align-items:center;gap:4px}
.lung-cell-lbl{font-size:11px;font-weight:700;color:var(--text-2);text-align:center;line-height:1.3}
.lbl-ics{display:block;font-size:9px;color:var(--text-4);font-weight:400;white-space:nowrap}

.ics-guide{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:14px}
.ics-guide-hd{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.3px;margin-bottom:6px}
.ics-dir{display:flex;justify-content:space-between;font-size:10px;color:var(--text-4);margin-bottom:4px}
.lung-btn{
  width:100%;min-height:52px;padding:6px 4px;border:1.5px solid var(--border-2);border-radius:8px;
  background:#fff;font-size:12px;font-weight:700;color:var(--text-3);
  cursor:pointer;transition:var(--tr);display:flex;align-items:center;justify-content:center;
  text-align:center;line-height:1.2;
}
.lung-btn:hover{border-color:var(--blue);color:var(--blue)}
.lung-btn.st-n{border-color:var(--fn);background:var(--sb0);color:var(--fn)}
.lung-btn.st-l{border-color:var(--fl);background:#eff6ff;color:var(--fl)}
.lung-btn.st-b{border-color:var(--fb);background:var(--sb1);color:var(--fb)}
.lung-btn.st-s{border-color:var(--fs);background:#f0fdfa;color:var(--fs)}
.lung-btn.st-c{border-color:var(--fc);background:#fffbeb;color:var(--fc)}
.lung-btn.st-d{border-color:var(--fd);background:#fff7ed;color:var(--fd)}
.lung-btn.st-h{border-color:var(--fh);background:#fef2f2;color:var(--fh)}
.lung-btn.st-e{border-color:var(--fe);background:#ede9fe;color:var(--fe)}
.lung-btn.st-a{border-color:var(--fa);background:var(--sb4);color:var(--fa)}
.lung-quick{display:flex;gap:8px;margin-bottom:10px}

/* ─────────────────────────────────────────
   Score slider
───────────────────────────────────────── */
.score-row{display:flex;align-items:center;gap:14px}
.score-slider{flex:1;height:6px;-webkit-appearance:none;appearance:none;
  border-radius:3px;background:var(--border-2);outline:none;cursor:pointer}
.score-slider::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--navy);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.score-pill{
  min-width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:20px;color:#fff;flex-shrink:0;transition:var(--tr);
}
.score-desc{font-size:12px;color:var(--text-3);margin-top:5px;line-height:1.5}

/* ─────────────────────────────────────────
   Toggle
───────────────────────────────────────── */
.toggle-row{display:flex;align-items:center;gap:10px}
.toggle{position:relative;display:inline-block;width:42px;height:23px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tgl-slider{position:absolute;inset:0;background:#d1d5db;border-radius:12px;transition:var(--tr);cursor:pointer}
.tgl-slider::before{content:'';position:absolute;height:17px;width:17px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:var(--tr)}
.toggle input:checked+.tgl-slider{background:var(--teal)}
.toggle input:checked+.tgl-slider::before{transform:translateX(19px)}

/* ─────────────────────────────────────────
   Badges / Tags
───────────────────────────────────────── */
.badge{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:700}
.b-blue{background:var(--blue-lt);color:var(--blue)}
.b-teal{background:var(--teal-lt);color:var(--teal)}
.b-amber{background:var(--amber-lt);color:var(--amber)}
.b-red{background:var(--red-lt);color:var(--red)}
.b-gray{background:var(--gray-lt);color:var(--text-3)}
.score-badge{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-weight:800;font-size:12px;color:#fff}
.sc0{background:var(--s0)}.sc1{background:var(--s1)}.sc2{background:var(--s2)}
.sc3{background:var(--s3)}.sc4{background:var(--s4)}.sc5{background:var(--s5)}

/* ─────────────────────────────────────────
   Finding chips
───────────────────────────────────────── */
.finding-chip{display:inline-flex;align-items:center;justify-content:center;
  width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:700;border:1.5px solid transparent}
.fch-empty{border-color:var(--border-2);color:var(--text-4);background:#fafafa}
.fch-n{background:var(--sb0);border-color:var(--fn);color:var(--fn)}
.fch-l{background:#eff6ff;border-color:var(--fl);color:var(--fl)}
.fch-b{background:var(--sb1);border-color:var(--fb);color:var(--fb)}
.fch-s{background:#f0fdfa;border-color:var(--fs);color:var(--fs)}
.fch-c{background:#fffbeb;border-color:var(--fc);color:var(--fc)}
.fch-d{background:#fff7ed;border-color:var(--fd);color:var(--fd)}
.fch-h{background:#fef2f2;border-color:var(--fh);color:var(--fh)}
.fch-e{background:#ede9fe;border-color:var(--fe);color:var(--fe)}
.fch-a{background:var(--sb4);border-color:var(--fa);color:var(--fa)}
.lung-mini{display:flex;gap:2px;align-items:center}

/* ─────────────────────────────────────────
   Table
───────────────────────────────────────── */
.tbl-wrap{overflow-x:auto}
/* width:100% だけだと列が潰れて操作ボタンが切れる。内容幅まで広げて横スクロールに任せる */
.tbl-wrap table{min-width:max-content}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{
  background:var(--navy-2);color:#fff;padding:10px 13px;
  text-align:left;font-weight:600;white-space:nowrap;cursor:pointer;user-select:none;
}
thead th:hover{background:var(--navy)}
thead th.sort-asc::after{content:' ↑'}
thead th.sort-desc::after{content:' ↓'}
.tbl-sort-hint{font-size:10px;opacity:.45;margin-left:4px;font-weight:500;letter-spacing:0}
tbody tr{border-bottom:1px solid var(--border)}
tbody tr:hover{background:#f8fafc}
tbody td{padding:10px 13px;vertical-align:middle;color:var(--text-2)}
.tbl-link{color:var(--blue);font-weight:600;cursor:pointer}
.tbl-link:hover{text-decoration:underline}

/* ─────────────────────────────────────────
   Filter bar
───────────────────────────────────────── */
.filter-bar{
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:14px;
}
.filter-bar .form-input,.filter-bar .form-select{padding:7px 10px;font-size:13px;width:auto}
.btn-sm{padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:var(--tr);white-space:nowrap}
.btn-ghost{background:var(--gray-lt);color:var(--text-3);border:1px solid var(--border-2)}
.btn-ghost:hover{background:var(--border);color:var(--text)}
.btn-danger{background:var(--red-lt);color:var(--red)}
.btn-danger:hover{background:#fecaca}
.btn-edit{background:var(--blue-lt);color:var(--blue)}
.btn-edit:hover{background:#bfdbfe}

/* ─────────────────────────────────────────
   Callouts
───────────────────────────────────────── */
.callout{border-radius:var(--radius-sm);padding:11px 14px;margin:10px 0;display:flex;gap:9px;align-items:flex-start;font-size:13px}
.callout-i{flex-shrink:0;font-size:15px;margin-top:1px}
.cl-blue{background:var(--blue-lt);border-left:3px solid var(--blue)}
.cl-teal{background:var(--teal-lt);border-left:3px solid var(--teal)}
.cl-amber{background:var(--amber-lt);border-left:3px solid var(--amber)}
.cl-red{background:var(--red-lt);border-left:3px solid var(--red)}

/* ─────────────────────────────────────────
   Modal
───────────────────────────────────────── */
#modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:14px;box-shadow:var(--shadow-md);width:100%;max-width:540px;max-height:90vh;overflow-y:auto}
.modal.lg{max-width:700px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border)}
.modal-title{font-size:16px;font-weight:700;color:var(--navy-2)}
.modal-x{background:none;border:none;font-size:20px;color:var(--text-3);cursor:pointer;padding:0 4px;border-radius:5px;transition:var(--tr);line-height:1}
.modal-x:hover{background:var(--gray-lt)}
.modal-body{padding:20px 24px}
.modal-ft{padding:12px 24px 20px;display:flex;gap:8px;justify-content:flex-end}

/* ─────────────────────────────────────────
   Farm list items
───────────────────────────────────────── */
.farm-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:default;background:#fff}
.farm-item.active{border-color:var(--teal);background:var(--teal-lt)}
.farm-item-info{flex:1;min-width:0;cursor:pointer}
.farm-item-info:hover .farm-name-txt{color:var(--blue)}
.farm-name-txt{font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.farm-meta-txt{font-size:11px;color:var(--text-3)}
.farm-status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.fsd-active{background:var(--teal)}
.fsd-inactive{background:var(--border-2)}

/* ─────────────────────────────────────────
   Timeline (animal detail)
───────────────────────────────────────── */
.timeline{list-style:none;position:relative;padding-left:0}
.timeline::before{content:'';position:absolute;left:17px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{display:flex;gap:14px;margin-bottom:16px;position:relative}
.tl-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;color:#fff;flex-shrink:0;z-index:1}
.tl-content{flex:1;background:var(--gray-lt);border-radius:8px;padding:11px 14px;font-size:13px}
.tl-content strong{display:block;margin-bottom:4px;font-size:13px;color:var(--navy-2)}
.lung-det-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:6px 0;font-size:12px}
.lung-det-side{background:#fff;border-radius:6px;padding:8px 10px}
.lung-det-lbl{font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;margin-bottom:4px}
.lung-det-ics{display:flex;gap:3px;flex-wrap:wrap}

/* ─────────────────────────────────────────
   Benchmark bars
───────────────────────────────────────── */
.bm-item{margin-bottom:14px}
.bm-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.bm-bar-bg{background:var(--border);border-radius:4px;height:8px;overflow:hidden}
.bm-bar{height:100%;border-radius:4px;transition:width .5s}
.bm-ok{background:var(--teal)} .bm-warn{background:var(--amber)} .bm-alert{background:var(--red)}

/* ─────────────────────────────────────────
   Empty state
───────────────────────────────────────── */
.empty{text-align:center;padding:52px 20px;color:var(--text-3)}
.empty-icon{font-size:44px;margin-bottom:10px;opacity:.35}
.empty h3{font-size:15px;font-weight:600;margin-bottom:4px;color:var(--text-3)}

/* ─────────────────────────────────────────
   Toast
───────────────────────────────────────── */
#toast-box{position:fixed;bottom:22px;right:22px;z-index:500;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--navy-2);color:#fff;padding:11px 16px;border-radius:9px;font-size:13px;box-shadow:var(--shadow-md);display:flex;align-items:center;gap:8px;animation:tIn .2s ease}
.toast.ok{background:#065f46}.toast.warn{background:var(--amber)}.toast.err{background:var(--red)}
@keyframes tIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ─────────────────────────────────────────
   Home / No farm
───────────────────────────────────────── */
.home-wrap{max-width:480px;margin:80px auto;padding:0 20px;text-align:center}
.home-icon{font-size:54px;margin-bottom:16px}
.home-wrap h1{font-size:22px;font-weight:800;color:var(--navy-2);margin-bottom:6px}
.home-wrap p{font-size:13px;color:var(--text-3);margin-bottom:28px}

/* ─────────────────────────────────────────
   個体識別番号 表示
───────────────────────────────────────── */
.tag-cell{font-family:'Courier New',monospace;white-space:nowrap;letter-spacing:.5px}
.tag-pre{color:var(--text-3);font-size:13px}
.tag-exp{
  color:var(--navy);font-weight:800;font-size:15px;
  background:var(--blue-lt);padding:1px 4px;border-radius:4px;
  border:1px solid #bfdbfe;letter-spacing:1px;
}
.tag-cd{color:var(--text-4);font-size:12px}
.tag-exp-lg{
  display:inline-block;font-weight:800;font-size:17px;color:var(--navy);
  background:var(--blue-lt);border:1.5px solid #bfdbfe;
  padding:2px 10px;border-radius:7px;letter-spacing:2px;font-family:'Courier New',monospace;
}
.tag-preview-wrap{
  padding:10px 14px;background:var(--bg);border-radius:8px;
  border:1px solid var(--border);font-family:'Courier New',monospace;
  letter-spacing:1px;font-size:16px;min-height:42px;
}

/* ─────────────────────────────────────────
   野帳 (Field Notebook)
───────────────────────────────────────── */
.note-wrap{max-width:1100px;box-shadow:var(--shadow-md);border-radius:10px}
.note-hd{background:var(--navy-2);color:#fff;padding:14px 22px;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:space-between}
.note-hd-title{font-size:15px;font-weight:800;letter-spacing:-.2px}
.note-hd-sub{font-size:10.5px;opacity:.65;margin-top:3px}
.note-meta{display:grid;grid-template-columns:repeat(4,1fr);border:1.5px solid var(--border-2);border-top:none;padding:13px 22px;background:#fff;gap:16px}
.note-meta-lbl{font-size:10px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.note-meta-val{font-size:13px;font-weight:600;border-bottom:2px solid var(--border-2);min-height:26px;padding:2px 3px}
.note-meta-input{font-size:13px;font-weight:600;border:none;border-bottom:2px solid var(--border-2);background:transparent;width:100%;padding:2px 3px;font-family:inherit;color:var(--text)}
.note-meta-input:focus{outline:none;border-color:var(--blue)}
.note-legend{background:#f1f5f9;border:1.5px solid var(--border-2);border-top:none;padding:9px 22px;display:flex;flex-direction:column;gap:4px;font-size:11.5px;color:var(--text-2);line-height:1.7}
.note-legend strong{color:var(--navy-2)}
.note-legend-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.note-legend-score{margin-top:2px;color:var(--text-3);font-size:11px}
.note-tbl-wrap{overflow-x:auto;border:1.5px solid var(--border-2);border-top:none;border-radius:0 0 10px 10px}
.note-tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed}
.note-tbl th{background:var(--navy-2);color:#fff;padding:7px 3px;text-align:center;font-size:10px;font-weight:700;white-space:nowrap;border:1px solid #2a5280;line-height:1.35}
.note-tbl th.th-r{background:#1a4870}
.note-tbl th.th-l{background:#1a5c2a}
.note-tbl th.th-sp{background:#374151}
.note-tbl td{border:1px solid #cbd5e1;padding:2px 3px;text-align:center;height:26px;overflow:hidden;white-space:nowrap}
.note-tbl tr:nth-child(even) td{background:#f8fafc}
.note-tbl tr:hover td{background:#eff6ff}
.note-tbl td.td-no{color:var(--text-4);font-size:10px;width:24px}
.note-tbl td.td-tag{text-align:left;padding-left:5px;font-family:'Courier New',monospace;font-size:11px;font-weight:700;color:var(--navy)}
.note-tbl td.td-pre{font-family:'Courier New',monospace;font-size:11px;color:var(--text-2)}
.note-tbl td.td-score{font-weight:800;font-size:12px}
.note-tbl td.td-wide{text-align:left;padding-left:4px}
.note-th-sort{cursor:pointer;user-select:none;transition:.1s}
.note-th-sort:hover{background:#2a4f7a!important;opacity:.9}
.note-th-sort.ns-asc,.note-th-sort.ns-desc{background:#1a5c3a!important}
.ns-ic{font-size:8px;margin-left:2px;opacity:.5}
.note-th-sort.ns-asc .ns-ic,.note-th-sort.ns-desc .ns-ic{opacity:1;color:#7effc5}
.note-opts{display:flex;gap:14px;margin-bottom:18px;align-items:center;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 20px;box-shadow:var(--shadow)}

/* ─────────────────────────────────────────
   要フォロー管理
───────────────────────────────────────── */
.fu-row-urgent td{background:#fff1f2!important}
.fu-row-soon td{background:#fffbeb!important}
.fu-row-ok td{background:#f0fdf4!important}
.fu-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.fu-urgent{background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5}
.fu-soon{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
.fu-ok{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.fu-days{font-size:14px;font-weight:800}

/* ─────────────────────────────────────────
   スコアガイド
───────────────────────────────────────── */
.sg-score-row{display:grid;grid-template-columns:56px 1fr 1fr 1fr;gap:0;border-bottom:1px solid var(--border);align-items:stretch}
.sg-score-row:last-child{border-bottom:none}
.sg-score-cell{padding:10px 14px;display:flex;align-items:center;font-size:13px}
.sg-score-n{justify-content:center;border-right:1px solid var(--border)}
.sg-lobe-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:8px 0}
.sg-lobe{text-align:center;padding:8px 4px;border-radius:8px;font-size:11px;border:1.5px solid}

/* ─────────────────────────────────────────
   レポートスタイル（乳検レポートと同仕様）
───────────────────────────────────────── */
.rpt-wrap{max-width:780px;margin:0 auto;font-family:inherit;color:#1e293b}
.rpt-header{border-bottom:2.5px solid #1e3a8a;padding-bottom:10px;margin-bottom:28px}
.rpt-title{font-size:18px;font-weight:800;color:#1e3a8a;letter-spacing:.2px}
.rpt-subtitle{font-size:12px;color:#64748b;margin-top:5px}
.rpt-section{margin-bottom:32px}
.rpt-section-hd{display:flex;align-items:center;gap:10px;border-bottom:1.5px solid #e2e8f0;padding-bottom:8px;margin-bottom:20px}
.rpt-badge{width:26px;height:26px;border-radius:50%;background:#1e3a8a;color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.rpt-section-title{font-size:16px;font-weight:700;color:#1e3a8a}
.rpt-kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.rpt-kpi{border:1px solid #e2e8f0;border-radius:8px;padding:16px 18px}
.rpt-kpi-lbl{font-size:11px;color:#94a3b8;margin-bottom:8px;font-weight:500}
.rpt-kpi-val{font-size:30px;font-weight:800;line-height:1;color:#1e293b}
.rpt-kpi-unit{font-size:15px;font-weight:600;margin-left:2px}
.rpt-kpi-sub{font-size:11px;color:#94a3b8;margin-top:5px}
.rpt-dist-title{font-size:13px;font-weight:700;color:#1e293b;margin-bottom:10px}
.rpt-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:5px;font-size:12px}
.rpt-bar-lbl{width:100px;color:#64748b;text-align:right;flex-shrink:0;font-size:11px}
.rpt-bar-wrap{flex:1;background:#f1f5f9;border-radius:4px;height:22px;overflow:hidden}
.rpt-bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;color:#fff;font-size:11px;font-weight:700;transition:width .3s;min-width:0}
.rpt-bar-pct{width:34px;color:#64748b;flex-shrink:0;text-align:right;font-size:11px}
.rpt-tbl{width:100%;border-collapse:collapse;font-size:13px}
.rpt-tbl th{font-size:11px;color:#94a3b8;font-weight:600;padding:6px 10px;border-bottom:1.5px solid #e2e8f0;text-align:left;white-space:nowrap}
.rpt-tbl td{padding:10px 10px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.rpt-tbl tbody tr:last-child td{border-bottom:none}
.rpt-id{font-weight:700;color:#1e293b}
.rpt-score-badge{display:inline-block;padding:2px 10px;border-radius:4px;font-size:11px;font-weight:700;white-space:nowrap}
.rpt-no-data{padding:16px 0;color:#94a3b8;font-style:italic;font-size:13px}
.rpt-footer{border-top:1px solid #e2e8f0;padding-top:10px;margin-top:24px;font-size:10px;color:#94a3b8;display:flex;justify-content:space-between}
/* ─────────────────────────────────────────
   印刷
───────────────────────────────────────── */
@media print{
  #topbar,#toast-box,.note-opts,.no-print{display:none!important}
  #main{margin-top:0!important;padding:0!important}
  #view{padding:4px 6px!important}
  body{background:#fff!important}
  .note-wrap{box-shadow:none!important;border-radius:0!important}
  .note-hd{border-radius:0!important}
  .note-tbl{font-size:8.5px!important}
  .note-tbl td{height:16px!important;padding:0 1px!important}
  .note-tbl th{font-size:8px!important;padding:3px 1px!important}
  .note-meta{padding:6px 14px!important}
  .note-legend{padding:5px 14px!important;gap:2px!important}
  .note-legend-score{font-size:9.5px!important}
  .note-tbl-wrap{border-radius:0!important}
  .card,.callout{box-shadow:none!important}
  .rpt-kpi{border:1px solid #e2e8f0!important}
  .rpt-bar-fill,.rpt-score-badge,.rpt-badge{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .rpt-kpi-val,.rpt-id{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{size:A4 landscape;margin:7mm}
}

/* ─────────────────────────────────────────
   Responsive
───────────────────────────────────────── */
@media(max-width:860px){
  .kpi-grid{grid-template-columns:1fr 1fr}
  .chart-row{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .form-row-3{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  #topbar{padding:0 14px}
.tb-tab{padding:0 12px;font-size:12px}
  #view{padding:20px 14px 50px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:8px}
  .tb-actions .btn-outline{display:none}
}

/* ─── Hatch Map ───────────────────────────────── */
.hm-controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px}
.hm-date-nav{display:flex;align-items:center;gap:6px}
.hm-date-nav button{width:28px;height:28px;border:1px solid var(--border-2);border-radius:6px;background:var(--surface);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.hm-date-nav button:hover{background:var(--gray-lt)}
.hm-date-label{font-size:14px;font-weight:700;color:var(--navy-2);min-width:90px;text-align:center}
.hm-legend{display:flex;gap:8px;margin-left:auto;flex-wrap:wrap}
.hm-legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text-3)}
.hm-legend-dot{width:10px;height:10px;border-radius:50%}

.hm-outer{display:flex;gap:16px;overflow-x:auto;padding-bottom:8px}
.hm-column{flex:0 0 auto;min-width:130px}
.hm-col-header{font-size:12px;font-weight:700;color:var(--text-2);text-align:center;padding:6px 0;border-bottom:2px solid var(--border-2);margin-bottom:8px;letter-spacing:.4px}
.hm-col-left .hm-col-header{border-color:var(--blue);color:var(--blue)}
.hm-col-right .hm-col-header{border-color:var(--teal);color:var(--teal)}

.hm-cell{position:relative;border-radius:10px;border:2px solid var(--border);background:var(--surface);padding:8px 10px;margin-bottom:7px;cursor:pointer;transition:transform var(--tr),box-shadow var(--tr);min-height:68px}
.hm-cell:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.hm-cell.hm-active{outline:2px solid var(--navy);outline-offset:2px}
.hm-cell-no{font-size:10px;font-weight:700;color:var(--text-4);letter-spacing:.5px;margin-bottom:3px}
.hm-cell-tag{font-size:13px;font-weight:800;color:var(--text);font-family:'Courier New',monospace;letter-spacing:1px}
.hm-cell-score{position:absolute;top:7px;right:8px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff}
.hm-cell-info{font-size:10px;color:var(--text-3);margin-top:3px}
.hm-cell-empty{opacity:.45}
.hm-cell-empty .hm-cell-tag{color:var(--text-4);font-size:11px;font-weight:400;font-family:inherit}
/* Score colors for cells */
.hm-s0{border-color:#10b981;background:#f0fdf4}.hm-s0 .hm-cell-score{background:#10b981}
.hm-s1{border-color:#3b82f6;background:#eff6ff}.hm-s1 .hm-cell-score{background:#3b82f6}
.hm-s2{border-color:#f59e0b;background:#fffbeb}.hm-s2 .hm-cell-score{background:#f59e0b}
.hm-s3{border-color:#f97316;background:#fff7ed}.hm-s3 .hm-cell-score{background:#f97316}
.hm-s4{border-color:#ef4444;background:#fef2f2}.hm-s4 .hm-cell-score{background:#ef4444}
.hm-s5{border-color:#7f1d1d;background:#fff1f2}.hm-s5 .hm-cell-score{background:#7f1d1d}

.hm-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-top:12px}
.hm-detail-hd{font-size:14px;font-weight:700;color:var(--navy-2);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.hm-timeline{display:flex;flex-direction:column;gap:6px}
.hm-tl-item{display:grid;grid-template-columns:auto 1fr auto;gap:8px 12px;align-items:center;padding:8px 12px;border-radius:8px;background:var(--gray-lt);font-size:12px}
.hm-tl-date{color:var(--text-3);white-space:nowrap}
.hm-tl-tag{font-family:'Courier New',monospace;font-weight:700}
.hm-tl-dots{display:flex;gap:3px}
.hm-page-wrap{display:flex;flex-direction:column;height:100%}
.hm-scroll-area{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden}
.hm-hint-box{background:var(--blue-lt);border:1px solid #bfdbfe;border-radius:8px;margin-bottom:10px;font-size:12px;color:var(--text-2)}
.hm-hint-box summary{padding:8px 12px;cursor:pointer;font-weight:600;color:var(--blue);list-style:none;display:flex;align-items:center;gap:6px;user-select:none}
.hm-hint-box summary::-webkit-details-marker{display:none}
.hm-hint-box .hm-hint-body{padding:2px 14px 10px;line-height:2}
.hm-tl-dot{width:8px;height:8px;border-radius:50%}
.hm-no-data{padding:16px;text-align:center;color:var(--text-4);font-size:13px}

/* ─── Hatch Map 印刷ヘッダー（画面では非表示） ─── */
#hm-print-header{display:none}
.hm-print-blank{display:none}

/* ─── ハッチマップ印刷（縦・画面レイアウトに合わせる） ─── */
@media print{
  /* 野帳などは直前の @page（横）を継承。ハッチだけ名前付きページで縦 */
  @page hm-map{size:A4 portrait;margin:10mm 12mm}
  .hm-print-scope{page:hm-map}

  /* UI要素を非表示 */
  #topbar,.page-hd,.hm-controls,#hm-detail-wrap,.hm-btn-print,
  body > *:not(#main),#modal-bg,#toast-box{display:none!important}

  #main{margin-top:0!important}
  #view{max-width:none!important;padding:0!important}

  /* ── 印刷ヘッダー ── */
  #hm-print-header{
    display:flex!important;align-items:center;gap:10px;flex-wrap:wrap;
    padding-bottom:6px;margin-bottom:10px;
    border-bottom:2px solid #222;
  }
  #hm-print-header .ph-title{font-size:15px;font-weight:800;color:#000}
  #hm-print-header .ph-sub{font-size:10px;color:#444}
  #hm-print-header .ph-legend{
    display:flex!important;gap:7px;margin-left:auto;align-items:center;flex-wrap:wrap;
  }
  #hm-print-header .ph-legend-item{display:flex;align-items:center;gap:3px;font-size:9px;color:#333}
  #hm-print-header .ph-legend-dot{
    width:9px;height:9px;border-radius:50%;flex-shrink:0;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }

  /* hm-page-wrap / hm-scroll-area は印刷でフラットに戻す */
  .hm-page-wrap{display:block!important;height:auto!important}
  .hm-scroll-area{overflow:visible!important;height:auto!important;min-height:auto!important;flex:none!important}
  .hm-hint-box{display:none!important}

  /* 画面と同じ2列（メモ用の印刷専用空白列は出さない） */
  .hm-print-body{display:contents}
  .hm-print-blank{display:none!important}
  .hm-outer{
    display:flex!important;gap:16px!important;overflow:visible!important;
    width:100%;align-items:flex-start;justify-content:center;
  }

  .hm-column{
    flex:1 1 0;min-width:0;max-width:calc(50% - 8px);
  }
  .hm-col-header{
    font-size:12px!important;font-weight:800!important;
    text-align:center;padding:6px 0!important;margin-bottom:8px!important;
    border-bottom-width:2px!important;letter-spacing:.4px;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  .hm-col-left .hm-col-header{color:#1a5fb4!important;border-color:#1a5fb4!important}
  .hm-col-right .hm-col-header{color:#0a6b55!important;border-color:#0a6b55!important}

  /* 画面と同じ積み上げ＋右上スコア（幅固定をやめ、文字切れを防ぐ） */
  .hm-cell{
    position:relative!important;
    display:block!important;
    width:auto!important;max-width:100%!important;
    box-sizing:border-box!important;
    min-height:68px!important;
    padding:8px 36px 8px 10px!important;
    margin-bottom:7px!important;
    border-radius:10px!important;border-width:2px!important;
    page-break-inside:avoid;break-inside:avoid;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  .hm-cell:hover{transform:none!important;box-shadow:none!important}
  .hm-cell-no{font-size:10px!important;font-weight:700!important;margin-bottom:3px!important;color:var(--text-4)!important;letter-spacing:.5px}
  .hm-cell-tag{
    font-size:17px!important;font-weight:800!important;
    letter-spacing:1px!important;font-family:'Courier New',monospace!important;
    padding-right:2px;word-break:keep-all;overflow:visible!important;
  }
  .hm-cell-score{
    position:absolute!important;top:7px!important;right:8px!important;
    transform:none!important;
    width:22px!important;height:22px!important;font-size:11px!important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  .hm-cell-info{
    font-size:10px!important;margin-top:3px!important;color:var(--text-3)!important;
    line-height:1.35!important;white-space:normal!important;
  }
  /* 空ハッチも印刷で視認できるよう不透明・黒で描画 */
  .hm-cell-empty{
    opacity:1!important;
    border:2px solid #111!important;
    background:#fff!important;
    color:#000!important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }

<script>
'use strict';
// ─── Constants ────────────────────────────────────
const PFX = 'lu';
const FC   = ['','A','L','B','S','C','D','H','E','P'];
const FSTATE = {'':'','A':'st-n','L':'st-l','B':'st-b','S':'st-s','C':'st-c','D':'st-d','H':'st-h','E':'st-e','P':'st-a'};
const FCHIP  = {'':'fch-empty','A':'fch-n','L':'fch-l','B':'fch-b','S':'fch-s','C':'fch-c','D':'fch-d','H':'fch-h','E':'fch-e','P':'fch-a'};
const FLBL   = {'':'－','A':'正常（Aライン）','L':'線状Bライン（スコア影響なし・記録のみ）','B':'帯状Bライン（コメットライン）','S':'小コンソリデーション（<1cm²・スコア影響なし・記録のみ）','C':'局所コンソリデーション（≥1cm²）','D':'びまん性コンソリデーション（葉全体）','H':'肝変化（hepatization）','E':'胸水（pleural effusion）','P':'膿瘍（Purulent）'};
// ボタン表示用（短い日本語）
const FBTN   = {'':'未入力','A':'正常','L':'線状B','B':'帯状B','S':'小コンソリ','C':'局所C','D':'びまんC','H':'肝変化','E':'胸水','P':'膿瘍'};
// 小チップ用（1〜2文字）
const FCHP_CHR = {'':'－','A':'正','L':'Bl','B':'Bb','S':'小C','C':'局C','D':'広C','H':'肝','E':'胸','P':'膿'};
const SC     = ['#10b981','#3b82f6','#f59e0b','#f97316','#ef4444','#7f1d1d'];
const SCB    = ['#d1fae5','#dbeafe','#fef3c7','#ffedd5','#fee2e2','#fecaca'];
const SLBL   = ['正常（Aライン・線状Bライン）','帯状Bライン（コメットライン）','局所コンソリデーション（≥1cm²）','びまん性コンソリデーション 1葉','びまん性コンソリデーション 2葉','びまん性コンソリデーション≥3葉・肝変化・胸水'];
const SACT   = ['次回定期スキャンまで観察','5〜10日後に再スキャン','治療介入（7〜10日後再スキャン）','治療介入・薬剤選択再評価','積極的治療・廃用リスクを共有','緊急対応・予後不良を説明'];
const PROT   = {A:'集中型（7日間隔）',B:'標準型（14日間隔）',C:'簡易型（3点固定）'};
const BM     = {A:15,B:20,C:25};
const RPOS   = ['rf_a','rf_p','r_m','r_c'];
const LPOS   = ['lf_a','lf_p','l_c'];
const RLBL   = {rf_a:'前葉前部',rf_p:'前葉後部',r_m:'中葉',r_c:'後葉',
                lf_a:'前葉前部',lf_p:'前葉後部',l_c:'後葉'};

// ─── 個体識別番号ユーティリティ ─────────────────────
// 個体識別番号(10桁)の6〜9桁目 = 拡大4桁
const get拡4 = tag => { const d=tag.replace(/\D/g,''); return d.length>=9?d.slice(5,9):''; };
const fmtTagId = tag => {
  const d = tag.replace(/\D/g,'');
  if(d.length===10) return `<span class="tag-pre">${d.slice(0,5)}</span><span class="tag-exp">${d.slice(5,9)}</span><span class="tag-cd">${d.slice(9)}</span>`;
  return h(tag);
};

// ─── Utils ────────────────────────────────────────
const $ = id => document.getElementById(id);
const h = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const today = () => new Date().toLocaleDateString('sv-SE');
const todayCompact = () => { const d=new Date(); return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`; };
const fmtDate = d => d ? d.replace(/-/g,'/') : '－';
const calcAge = (b,s) => b ? Math.max(0,Math.floor((new Date(s||today()) - new Date(b))/86400000)) : null;
const genId = () => Date.now().toString(36)+Math.random().toString(36).slice(2);
const scClass = n => ['sc0','sc1','sc2','sc3','sc4','sc5'][n]||'sc0';

// ─── IndexedDB helpers（ファイルハンドル永続化）─────────────────────
const _idbOpen = () => new Promise((res,rej)=>{
  const r = indexedDB.open('ls-storage-v1',1);
  r.onupgradeneeded = e => e.target.result.createObjectStore('kv');
  r.onsuccess = e => res(e.target.result);
  r.onerror = ()=>rej(r.error);
});
const _idbGet = async key => {
  try{const db=await _idbOpen();return await new Promise((res,rej)=>{const r=db.transaction('kv').objectStore('kv').get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}catch{return undefined;}
};
const _idbSet = async (key,val) => {
  try{const db=await _idbOpen();await new Promise((res,rej)=>{const tx=db.transaction('kv','readwrite');tx.objectStore('kv').put(val,key);tx.oncomplete=res;tx.onerror=()=>rej(tx.error);});}catch{}
};

// ─── FileStore（File System Access API + IndexedDB ハンドル永続化）───────
const FileStore = {
  _handle: null,         // FileSystemFileHandle
  _needPermission: false,// 許可待ち状態フラグ
  _dirty: false,
  _timer: null,

  // ファイルステータスラベルを更新
  _setStatus(msg, perm=false){
    const el = document.getElementById('file-status');
    const dot = document.getElementById('file-dot');
    if(el){
      el.style.display = msg ? '' : 'none';
      if(perm){
        el.innerHTML = `<span style="color:var(--amber)">🔒 ${msg}</span><br><button class="btn-outline" style="font-size:11px;padding:2px 8px;height:auto;margin-top:4px" onclick="FileStore.requestPermission()">許可する</button>`;
      } else {
        el.textContent = msg;
      }
    }
    if(dot){
      dot.className = perm ? 'warn' : (msg && msg.includes('✅') ? 'ok' : (msg ? 'warn' : ''));
      dot.title = msg || 'ファイル未接続';
    }
  },

  // サポート確認
  _supported(){
    return typeof window.showOpenFilePicker === 'function';
  },

  // 全データをまとめてシリアライズ
  _serialize(){
    const farms = DB.getFarms();
    const data = {v:'fs1', date: new Date().toISOString(), farms,
      animals: Object.fromEntries(farms.map(f=>[f.id, DB.getAnimals(f.id)])),
      scans:   Object.fromEntries(farms.map(f=>[f.id, DB.getScans(f.id)]))
    };
    return JSON.stringify(data, null, 2);
  },

  // ファイルに書き込む（内部用）
  async _write(){
    if(!this._handle || this._needPermission) return;
    try{
      const writable = await this._handle.createWritable();
      await writable.write(this._serialize());
      await writable.close();
      const ts = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
      this._setStatus(`✅ ${this._handle.name}（${ts}保存）`);
      this._dirty = false;
    }catch(e){
      this._setStatus(`⚠️ 保存失敗: ${e.message}`);
    }
  },

  // データ変更時に呼び出す（300ms デバウンス）
  schedule(){
    if(!this._handle || this._needPermission) return;
    this._dirty = true;
    clearTimeout(this._timer);
    this._timer = setTimeout(()=>this._write(), 300);
  },

  // 既存ファイルを開いて内容をロード
  async openFile(){
    if(!this._supported()){
      toast('このブラウザは File System Access API に対応していません（Edge/Chrome を使用してください）','err',4000);
      return;
    }
    try{
      const [handle] = await window.showOpenFilePicker({
        types:[{description:'DairyNotebookLS データ',accept:{'application/json':['.json']}}],
        multiple: false
      });
      this._handle = handle;
      this._needPermission = false;
      const file = await handle.getFile();
      const text = await file.text();
      const d = JSON.parse(text);
      if(d.v === 'fs1'){
        if(Array.isArray(d.farms)){
          DB._bulkLoad(d.farms, d.animals||{}, d.scans||{});
          toast(`ファイルを開きました（${d.farms.length}農場）`,'ok');
        }
      } else if(d.farm && Array.isArray(d.scans)){
        App.importFarm(new File([text], handle.name, {type:'application/json'}));
      } else {
        throw new Error('対応していないファイル形式です');
      }
      await _idbSet('fileHandle', handle);
      this._setStatus(`📂 ${handle.name}`);
      updateTopBar();
      Router.nav('/dashboard');
    }catch(e){
      if(e.name !== 'AbortError') toast('ファイルを開けませんでした: '+e.message,'err');
    }
  },

  // 名前を付けて保存（新規ファイル作成 or 上書き先指定）
  async saveAs(){
    if(!this._supported()){
      const blob = new Blob([this._serialize()],{type:'application/json'});
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = `LS_${todayCompact()}.json`; a.click();
      URL.revokeObjectURL(url);
      toast('ダウンロードしました（ブラウザが File System Access API 非対応）','ok');
      return;
    }
    try{
      const handle = await window.showSaveFilePicker({
        suggestedName: `LS_${todayCompact()}.json`,
        types:[{description:'DairyNotebookLS データ',accept:{'application/json':['.json']}}]
      });
      this._handle = handle;
      this._needPermission = false;
      await this._write();
      await _idbSet('fileHandle', handle);
      toast(`「${handle.name}」に保存しました`,'ok');
    }catch(e){
      if(e.name !== 'AbortError') toast('保存失敗: '+e.message,'err');
    }
  },

  // 起動時：IndexedDB からハンドルを復元
  async tryRestore(){
    if(!this._supported()) return;
    try{
      const h = await _idbGet('fileHandle');
      if(!h) return;
      const perm = await h.queryPermission({mode:'readwrite'});
      if(perm === 'granted'){
        this._handle = h;
        this._needPermission = false;
        const file = await h.getFile();
        const text = await file.text();
        const d = JSON.parse(text);
        if(d.v === 'fs1' && Array.isArray(d.farms)){
          DB._bulkLoad(d.farms, d.animals||{}, d.scans||{});
        }
        const ts = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
        this._setStatus(`✅ ${h.name}（${ts}読込）`);
        updateTopBar();
        if(DB.activeId() && DB.getFarm(DB.activeId())) Router.nav('/dashboard');
        else renderHome();
      } else {
        // 許可待ち状態を保持（ユーザーがボタンをクリックして許可）
        this._handle = h;
        this._needPermission = true;
        const tmpFile = await h.getFile();
        this._setStatus(tmpFile.name, true);
      }
    }catch(e){ this._handle = null; }
  },

  // アクセス再許可（ユーザー操作）
  async requestPermission(){
    if(!this._handle) return;
    try{
      const perm = await this._handle.requestPermission({mode:'readwrite'});
      if(perm === 'granted'){
        this._needPermission = false;
        const file = await this._handle.getFile();
        const text = await file.text();
        const d = JSON.parse(text);
        if(d.v === 'fs1' && Array.isArray(d.farms)){
          DB._bulkLoad(d.farms, d.animals||{}, d.scans||{});
        }
        const ts = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
        this._setStatus(`✅ ${this._handle.name}（${ts}読込）`);
        updateTopBar();
        toast('ファイルに接続しました','ok');
        if(DB.activeId() && DB.getFarm(DB.activeId())) Router.nav('/dashboard');
        else renderHome();
      }
    }catch(e){}
  }
};

// ─── DB ───────────────────────────────────────────
const DB = {
  g(k){try{return JSON.parse(localStorage.getItem(`${PFX}:${k}`))||null}catch{return null}},
  s(k,v){localStorage.setItem(`${PFX}:${k}`,JSON.stringify(v))},
  getFarms(){return this.g('farms')||[]},
  saveFarms(f){this.s('farms',f);FileStore.schedule();},
  getFarm(id){return this.getFarms().find(f=>f.id===id)||null},
  saveFarm(f){const a=this.getFarms();const i=a.findIndex(x=>x.id===f.id);i>=0?a[i]=f:a.push(f);this.saveFarms(a)},
  delFarm(id){this.saveFarms(this.getFarms().filter(f=>f.id!==id));['animals','scans'].forEach(k=>localStorage.removeItem(`${PFX}:${id}:${k}`));if(this.activeId()===id)this.s('active','')},
  activeId(){return this.g('active')||null},
  setActive(id){this.s('active',id)},
  getAnimals(fid){try{return JSON.parse(localStorage.getItem(`${PFX}:${fid}:animals`))||[]}catch{return[]}},
  saveAnimals(fid,a){localStorage.setItem(`${PFX}:${fid}:animals`,JSON.stringify(a));FileStore.schedule();},
  findByTag(fid,tag){return this.getAnimals(fid).find(a=>a.tagId===tag.trim())||null},
  upsertAnimal(fid,tag,extra={}){
    let a=this.getAnimals(fid);let x=a.find(i=>i.tagId===tag.trim());
    if(!x){x={id:genId(),tagId:tag.trim(),birthDate:'',sex:'',breed:'',createdAt:today(),...extra};a.push(x);}
    else Object.keys(extra).forEach(k=>{if(extra[k])x[k]=extra[k];});
    this.saveAnimals(fid,a);return x;
  },
  getScans(fid){try{return JSON.parse(localStorage.getItem(`${PFX}:${fid}:scans`))||[]}catch{return[]}},
  saveScans(fid,s){localStorage.setItem(`${PFX}:${fid}:scans`,JSON.stringify(s));FileStore.schedule();},
  addScan(fid,s){const a=this.getScans(fid);s.id=genId();s.createdAt=new Date().toISOString();a.push(s);this.saveScans(fid,a);return s},
  updateScan(fid,s){const a=this.getScans(fid);const i=a.findIndex(x=>x.id===s.id);if(i>=0){a[i]=s;this.saveScans(fid,a);}},
  delScan(fid,sid){this.saveScans(fid,this.getScans(fid).filter(s=>s.id!==sid))},
  byAnimal(fid,animalId){return this.getScans(fid).filter(s=>s.animalId===animalId).sort((a,b)=>a.scanDate.localeCompare(b.scanDate))},
  exportData(fid){
    const farm=this.getFarm(fid);if(!farm)return null;
    return JSON.stringify({v:2,date:new Date().toISOString(),farm,animals:this.getAnimals(fid),scans:this.getScans(fid)},null,2);
  },
  importData(json){
    const d=JSON.parse(json);if(!d.farm||!Array.isArray(d.scans))throw new Error('フォーマットエラー');
    const nid=genId();
    const farm={...d.farm,id:nid,name:(d.farm.name||'農場')+'（インポート）',updatedAt:today()};
    this.saveFarm(farm);this.saveAnimals(nid,d.animals||[]);
    this.saveScans(nid,(d.scans||[]).map(s=>({...s,farmId:nid})));return nid;
  },
  // FileStore から全農場を一括ロード（localStorage も更新）
  _bulkLoad(farms, animalsMap, scansMap){
    this.s('farms', farms);
    farms.forEach(f=>{
      localStorage.setItem(`${PFX}:${f.id}:animals`, JSON.stringify(animalsMap[f.id]||[]));
      localStorage.setItem(`${PFX}:${f.id}:scans`,   JSON.stringify(scansMap[f.id]||[]));
    });
    if(farms.length > 0 && !this.getFarm(this.activeId())){
      this.setActive(farms[0].id);
    }
  }
};

// ─── Drug Frequency ───────────────────────────────
const DRUG_BASE=[
  'エンロフロキサシン','フロルフェニコール','ツラスロマイシン','ガミスロマイシン',
  'チルミコシン','オキシテトラサイクリン','セフチオフル','タルチスロマイシン',
  'マルボフロキサシン','ダノフロキサシン','アンピシリン','セフキノム',
  'アモキシシリン','タイロシン','ペニシリンG','ゲンタマイシン',
  'TMP/SMX','カナマイシン','ネオマイシン','コリスチン','スペクチノマイシン','ドキシサイクリン','チアンフェニコール'
];
const DrugFreq={
  _k:`${PFX}:drug_freq`,
  get(){try{return JSON.parse(localStorage.getItem(this._k))||{}}catch{return{}}},
  inc(drug){
    if(!drug)return;
    const m=this.get();m[drug]=(m[drug]||0)+1;
    localStorage.setItem(this._k,JSON.stringify(m));
  },
  sorted(){
    const m=this.get();
    const known=DRUG_BASE.slice().sort((a,b)=>(m[b]||0)-(m[a]||0)||(DRUG_BASE.indexOf(a)-DRUG_BASE.indexOf(b)));
    const unknown=Object.keys(m).filter(d=>!DRUG_BASE.includes(d)).sort((a,b)=>m[b]-m[a]);
    return [...unknown,...known];
  },
  datalistHtml(){return this.sorted().map(d=>`<option value="${d}">`).join('');}
};

// ─── Analysis ─────────────────────────────────────
const Calc = {
  prev(scans){const t=scans.length,p=scans.filter(s=>s.obScore>=2).length;return{t,p,r:t?+(p/t*100).toFixed(1):0}},
  byDate(fid){
    const map={};DB.getScans(fid).forEach(s=>{if(!map[s.scanDate])map[s.scanDate]={d:s.scanDate,t:0,p:0};map[s.scanDate].t++;if(s.obScore>=2)map[s.scanDate].p++;});
    return Object.values(map).sort((a,b)=>a.d.localeCompare(b.d)).map(x=>({...x,r:+(x.p/x.t*100).toFixed(1)}));
  },
  dist(fid){const d=[0,0,0,0,0,0];DB.getScans(fid).forEach(s=>{if(s.obScore>=0&&s.obScore<=5)d[s.obScore]++;});return d;},
  treatRate(fid){const sc=DB.getScans(fid);const t=sc.filter(s=>s.treated).length;return{t,tot:sc.length,r:sc.length?+(t/sc.length*100).toFixed(1):0}},
  bm(fid){
    const farm=DB.getFarm(fid);const tgt=BM[farm?.protocol||'B'];
    const bd=this.byDate(fid);const cur=bd.length?bd[bd.length-1].r:null;
    return{cur,tgt,status:cur===null?'none':cur<=tgt?'ok':cur<=tgt*1.5?'warn':'alert'};
  },
  suggest(r,l){
    const all=[...Object.values(r||{}),...Object.values(l||{})];
    // 肝変化・胸水・膿瘍 → スコア5
    if(all.includes('H')||all.includes('E')||all.includes('P'))return 5;
    // びまん性コンソリデーション（D）の葉数でスコア決定
    const diffuse=all.filter(x=>x==='D').length;
    if(diffuse>=3)return 5;
    if(diffuse===2)return 4;
    if(diffuse===1)return 3;
    // 局所コンソリデーション（C）が1ヶ所以上 → スコア2
    if(all.includes('C'))return 2;
    // 帯状Bライン（コメットライン）→ スコア1
    if(all.includes('B'))return 1;
    // 線状Bライン（L）はスコアに影響しない → 0
    return 0;
  }
};

// ─── HutchUtil ────────────────────────────────────
const HutchUtil = {
  get(fid){ return DB.getFarm(fid)?.hutches||[]; },

  // 指定日時点でのハッチ占有者を返す {scan, animal} or null
  occupant(fid, hutchId, asOf){
    const sc = DB.getScans(fid)
      .filter(s=>s.hutchId===hutchId && s.scanDate<=asOf)
      .sort((a,b)=>b.scanDate.localeCompare(a.scanDate)||b.createdAt.localeCompare(a.createdAt));
    if(!sc.length) return null;
    const scan=sc[0];
    const animal=DB.getAnimals(fid).find(a=>a.id===scan.animalId)||null;
    return {scan,animal};
  },

  // ハッチの入退記録を時系列で返す [{tagId,from,to,scans,lastScore}]
  history(fid, hutchId){
    const scans=DB.getScans(fid).filter(s=>s.hutchId===hutchId)
      .sort((a,b)=>a.scanDate.localeCompare(b.scanDate));
    const groups=[];
    for(const s of scans){
      const last=groups[groups.length-1];
      if(last && last.animalId===s.animalId){last.scans.push(s);last.to=s.scanDate;last.lastScore=s.obScore;}
      else groups.push({animalId:s.animalId,tagId:s.tagId,scans:[s],from:s.scanDate,to:s.scanDate,lastScore:s.obScore});
    }
    return groups;
  },

  // 個体のハッチ移動履歴 [{hutchLabel, scanDate, obScore}]
  animalMoves(fid, animalId){
    const hutches=this.get(fid);
    return DB.getScans(fid).filter(s=>s.animalId===animalId && s.hutchId)
      .sort((a,b)=>a.scanDate.localeCompare(b.scanDate))
      .map(s=>({...s, hutchLabel: hutches.find(h=>h.id===s.hutchId)?.label||s.hutchId}));
  },

  /** 個体のスキャン履歴で、ハッチが記録されている直近1件（スキャン日・作成日の新しい順） */
  lastHutchFromScans(fid, animalId){
    const scans=DB.getScans(fid).filter(s=>s.animalId===animalId&&(s.hutchId||s.hutchFree))
      .sort((a,b)=>b.scanDate.localeCompare(a.scanDate)||String(b.createdAt||'').localeCompare(String(a.createdAt||'')));
    return scans[0]||null;
  },

  // ファームのスキャン日一覧（昇順）
  scanDates(fid){ return [...new Set(DB.getScans(fid).map(s=>s.scanDate))].sort(); },

  // 標準レイアウト生成
  genStandard(leftN, rightN, lbl0='左列', lbl1='右列'){
    const h=[];
    for(let i=0;i<leftN;i++) h.push({id:genId(),label:`${lbl0}-${i+1}`,col:0,row:i});
    for(let i=0;i<rightN;i++) h.push({id:genId(),label:`${lbl1}-${i+1}`,col:1,row:i});
    return h;
  },

  // レイアウトのグリッドサイズを返す {cols, rows}
  gridSize(hutches){
    if(!hutches.length) return {cols:0,rows:0};
    return {cols:Math.max(...hutches.map(h=>h.col))+1, rows:Math.max(...hutches.map(h=>h.row))+1};
  },

  // 列ごとのラベルを返す（farm.hutchColLabels または自動生成）
  colLabel(farm, col){
    if(farm.hutchColLabels && farm.hutchColLabels[col]) return farm.hutchColLabels[col];
    return col===0?'左列':col===1?'右列':`列${col+1}`;
  }
};

const Router={
  _r:{},on(p,fn){this._r[p]=fn;},nav(p){location.hash=p;},
  resolve(){
    const h=location.hash.slice(1)||'/dashboard';
    for(const[p,fn] of Object.entries(this._r)){const m=this._m(p,h);if(m!==null){fn(m);this._hl(h);return;}}
    this._r['/dashboard']&&this._r['/dashboard']({});this._hl('/dashboard');
  },
  _m(pat,path){const pp=pat.split('/'),hp=path.split('/');if(pp.length!==hp.length)return null;const pm={};for(let i=0;i<pp.length;i++){if(pp[i][0]===':')pm[pp[i].slice(1)]=hp[i];else if(pp[i]!==hp[i])return null;}return pm;},
  _hl(path){document.querySelectorAll('[data-route]').forEach(el=>{el.classList.toggle('active',path===el.dataset.route||path.startsWith(el.dataset.route+'/'))} );},
  init(){window.addEventListener('hashchange',()=>this.resolve());this.resolve();}
};

// HISTORY
let HS={sort:null,sortDir:0,f:{}};
const renderHistory=()=>{
  const fid=DB.activeId();const farm=DB.getFarm(fid);
  if(!fid||!farm){renderHome();return;}
  let sc=DB.getScans(fid);
  const f=HS.f;
  if(f.tag) sc=sc.filter(s=>s.tagId&&(s.tagId.includes(f.tag)||get拡4(s.tagId).includes(f.tag)));
  if(f.sm!=null) sc=sc.filter(s=>s.obScore>=f.sm);
  if(f.tr==='y') sc=sc.filter(s=>s.treated);
  if(f.tr==='n') sc=sc.filter(s=>!s.treated);
  if(f.df) sc=sc.filter(s=>s.scanDate>=f.df);
  if(f.dt) sc=sc.filter(s=>s.scanDate<=f.dt);
  const hutches=HutchUtil.get(fid);
  const hutchLabel=s=>s.hutchId?(hutches.find(h=>h.id===s.hutchId)?.label||s.hutchId):s.hutchFree||'';
  if(HS.sort&&HS.sortDir>0){
    const d=HS.sortDir===1?1:-1;
    sc.sort((a,b)=>{
      switch(HS.sort){
        case 'scanDate': return a.scanDate.localeCompare(b.scanDate)*d;
        case 'tagId':    return get拡4(a.tagId).localeCompare(get拡4(b.tagId))*d;
        case 'ageAtScan':return ((a.ageAtScan??-1)-(b.ageAtScan??-1))*d;
        case 'hutch':    return hutchLabel(a).localeCompare(hutchLabel(b),undefined,{numeric:true,sensitivity:'base'})*d;
        case 'obScore':  return (a.obScore-b.obScore)*d;
        case 'treated':  return ((a.treated?1:0)-(b.treated?1:0))*d;
        case 'drug':     return (a.drug||'').localeCompare(b.drug||'')*d;
        case 'notes':    return (a.notes||'').localeCompare(b.notes||'')*d;
        default: return 0;
      }
    });
  } else {
    sc.sort((a,b)=>b.scanDate.localeCompare(a.scanDate));
  }
  const hsIc=col=>HS.sort===col?(HS.sortDir===1?'<span class="ns-ic">▲</span>':'<span class="ns-ic">▼</span>'):'<span class="ns-ic">⇅</span>';
  const mkTh=(col,lbl)=>`<th class="note-th-sort${HS.sort===col?(HS.sortDir===1?' ns-asc':' ns-desc'):''}" onclick="App.sortH('${col}')">${lbl}${hsIc(col)}</th>`;

  setView(`
  <div class="page-hd">
    <div class="page-title">記録履歴</div>
    <div class="page-sub">${h(farm.name)}　全 ${DB.getScans(fid).length} 件</div>
  </div>
  <div class="filter-bar">
    <input class="form-input" placeholder="拡大4桁または耳標番号で検索" value="${h(f.tag||'')}" oninput="App.setF('tag',this.value)" style="width:200px">
    <select class="form-select" onchange="App.setF('sm',this.value?Number(this.value):null)">
      <option value="">スコア：全て</option>
      ${[1,2,3,4,5].map(n=>`<option value="${n}" ${f.sm===n?'selected':''}>≥${n}</option>`).join('')}
    </select>
    <select class="form-select" onchange="App.setF('tr',this.value)">
      <option value="">治療：全て</option>
      <option value="y" ${f.tr==='y'?'selected':''}>治療あり</option>
      <option value="n" ${f.tr==='n'?'selected':''}>治療なし</option>
    </select>
    <input class="form-input" type="date" value="${f.df||''}" onchange="App.setF('df',this.value)" style="width:138px" title="開始日">
    <span style="color:var(--text-4);font-size:12px">〜</span>
    <input class="form-input" type="date" value="${f.dt||''}" onchange="App.setF('dt',this.value)" style="width:138px" title="終了日">
    <button class="btn-sm btn-ghost" onclick="App.clrF()">リセット</button>
    <span style="margin-left:auto;font-size:12px;color:var(--text-3)">${sc.length} 件</span>
  </div>
  ${sc.length===0?`<div class="card"><div class="card-body"><div class="empty"><div class="empty-icon">🔍</div><h3>該当する記録がありません</h3><p>フィルタ条件を変更してください</p></div></div></div>`:
  `<div class="card" style="overflow:hidden"><div class="tbl-wrap"><table>
  <thead><tr>${mkTh('scanDate','スキャン日')}${mkTh('tagId','個体識別番号')}${mkTh('ageAtScan','日齢')}${mkTh('hutch','場所')}${mkTh('obScore','スコア')}<th>右肺</th><th>左肺</th>${mkTh('treated','治療')}${mkTh('drug','薬剤')}${mkTh('notes','備考')}<th>操作</th></tr></thead>
  <tbody>${sc.map(s=>`<tr>
    <td>${fmtDate(s.scanDate)}<br><span style="font-size:10px;color:var(--text-4)">R${s.round||1}</span></td>
    <td class="tag-cell"><span class="tbl-link" onclick="App.openAnimalModal('${h(s.animalId)}')">${fmtTagId(s.tagId)}</span></td>
    <td>${s.ageAtScan!=null?s.ageAtScan+'日':'－'}</td>
    <td style="font-size:12px;color:var(--text-3)">${h(hutchLabel(s))}</td>
    <td><span class="score-badge ${scClass(s.obScore)}">${s.obScore}</span></td>
    <td>${miniLung(s.right)}</td><td>${miniLung(s.left)}</td>
    <td>${s.treated?'<span class="badge b-red">あり</span>':'<span style="color:var(--text-4)">－</span>'}</td>
    <td style="font-size:12px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-3)">${h(s.drug||'')}</td>
    <td style="font-size:12px;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-3)">${h(s.notes||'')}</td>
    <td style="white-space:nowrap">
      <button class="btn-sm btn-edit" onclick="App.editScan('${s.id}')" style="margin-right:4px">編集</button>
      <button class="btn-sm btn-danger" onclick="App.delScan('${s.id}')">削除</button>
    </td>
  </tr>`).join('')}</tbody></table></div></div>`}
  `);
};

// ─── FOLLOW-UP VIEW ──────────────────────────────
const renderFollowup=()=>{
  const fid=DB.activeId();const farm=DB.getFarm(fid);
  if(!fid||!farm){renderHome();return;}
  const animals=DB.getAnimals(fid);
  const allScans=DB.getScans(fid);

  // 各個体の最終スキャンを取得してフォロー要否を判定
  const rows=animals.map(a=>{
    const sc=allScans.filter(s=>s.animalId===a.id).sort((x,y)=>y.scanDate.localeCompare(x.scanDate));
    const last=sc[0];if(!last)return null;
    const daysSince=Math.floor((new Date(today())-new Date(last.scanDate))/86400000);
    let status='ok',badge='',action='';
    if(last.obScore>=2&&!last.treated){
      status='urgent';badge='<span class="fu-badge fu-urgent">🚨 未治療・要介入</span>';
      action='スコア≥2で治療未実施。即時対応を推奨。';
    } else if(last.obScore>=2&&last.treated&&daysSince<7){
      status='ok';badge='<span class="fu-badge fu-ok">⏳ 治療中</span>';
      action=`治療後${daysSince}日。再スキャンは${7-daysSince}日後以降。`;
    } else if(last.obScore>=2&&last.treated&&daysSince>=7){
      status='urgent';badge='<span class="fu-badge fu-urgent">🔴 再スキャン期限超過</span>';
      action=`治療後${daysSince}日経過。7〜10日後再スキャン期限を過ぎています。`;
    } else if(last.obScore===1&&daysSince<5){
      status='ok';badge='<span class="fu-badge fu-ok">⏳ 観察中</span>';
      action=`スコア1。再スキャンまで${5-daysSince}日。`;
    } else if(last.obScore===1&&daysSince>=5){
      status='soon';badge='<span class="fu-badge fu-soon">🟡 再スキャン推奨</span>';
      action=`スコア1・${daysSince}日経過。5〜10日後再スキャン時期です。`;
    } else {
      status='ok';badge='<span class="fu-badge fu-ok">✅ 問題なし</span>';
      action='次回定期スキャンまで観察継続。';
    }
    return{a,last,daysSince,status,badge,action};
  }).filter(Boolean);

  const urgentN=rows.filter(r=>r.status==='urgent').length;
  const soonN=rows.filter(r=>r.status==='soon').length;
  const sorted=rows.sort((a,b)=>{const o={urgent:0,soon:1,ok:2};return o[a.status]-o[b.status]||b.daysSince-a.daysSince;});

  setView(`
  <div class="page-hd">
    <div class="page-title">要フォロー管理</div>
    <div class="page-sub">${h(farm.name)}　🚨 緊急 ${urgentN}頭　🟡 要注意 ${soonN}頭</div>
  </div>
  ${urgentN>0?`<div class="callout cl-red no-print" style="margin-bottom:14px"><div class="callout-i">🚨</div><div><strong>${urgentN}頭が緊急対応または再スキャン期限超過です。</strong>早急に確認してください。</div></div>`:''}
  ${rows.length===0?`<div class="card"><div class="card-body"><div class="empty"><div class="empty-icon">✅</div><h3>フォローが必要な個体はいません</h3><p>スキャンデータが入ると自動で表示されます</p></div></div></div>`:`
  <div class="card" style="overflow:hidden"><div class="tbl-wrap"><table>
  <thead><tr>
    <th>個体識別番号</th><th>最終スキャン日</th><th>日齢</th>
    <th>スコア</th><th>治療</th><th>経過日数</th>
    <th>ステータス</th><th>推奨アクション</th><th class="no-print">操作</th>
  </tr></thead>
  <tbody>${sorted.map(({a,last,daysSince,status,badge,action})=>`<tr class="fu-row-${status}">
    <td class="tag-cell"><span class="tbl-link" onclick="App.openAnimalModal('${h(a.id)}')">${fmtTagId(a.tagId)}</span></td>
    <td>${fmtDate(last.scanDate)}<br><span style="font-size:10px;color:var(--text-4)">R${last.round||1}</span></td>
    <td>${last.ageAtScan!=null?last.ageAtScan+'日':'－'}</td>
    <td><span class="score-badge ${scClass(last.obScore)}">${last.obScore}</span></td>
    <td>${last.treated?'<span class="badge b-red">あり</span>':'<span style="color:var(--text-4)">－</span>'}</td>
    <td><span class="fu-days" style="color:${status==='urgent'?'var(--red)':status==='soon'?'var(--amber)':'var(--teal)'}">${daysSince}日</span></td>
    <td>${badge}</td>
    <td style="font-size:11px;max-width:200px;color:var(--text-2)">${h(action)}</td>
    <td class="no-print" style="white-space:nowrap">
      <button class="btn-sm btn-edit" onclick="App.addScanFor('${h(a.tagId)}')">スキャン入力</button>
    </td>
  </tr>`).join('')}</tbody></table></div></div>`}
  <div style="margin-top:10px;font-size:11px;color:var(--text-3);padding:0 4px">
    ※ 判定基準：スコア≥2 治療後7〜10日 → 再スキャン必須。スコア1 → 5〜10日後に再スキャン。スコア≥2 未治療 → 即時介入。
    （Ollivett &amp; Buczinski, Vet Clin NA Food Anim Pract. 2016;32:19-35）
  </div>
  `);
};

// ─── FIELD NOTES VIEW ────────────────────────────
let NS={prefill:true,date:today(),examiner:'',sort:null,sortDir:0};
let RS={date:'',examiner:''};
const renderNotes=()=>{
  const fid=DB.activeId();const farm=DB.getFarm(fid);
  if(!fid||!farm){renderHome();return;}
  const animals=DB.getAnimals(fid).sort((a,b)=>get拡4(a.tagId).localeCompare(get拡4(b.tagId)));
  const allScans=DB.getScans(fid);
  const notesHutches=HutchUtil.get(fid);
  const ROW_COUNT=40;

  // 自動入力ON：検査日（野帳の検査日）より前のスキャン日のうち最新日＝「前回検査日」。その日に検査された個体（各個体の最新スキャンがその日）のみ。最大40頭・拡大4桁順
  const refDate=NS.date;
  let prevRoundDate=null;
  const rows=[];
  if(NS.prefill){
    const byId=new Map(animals.map(a=>[a.id,a]));
    const lastScanByAnimal=new Map();
    allScans.forEach(s=>{
      const cur=lastScanByAnimal.get(s.animalId);
      if(!cur||s.scanDate.localeCompare(cur.scanDate)>0) lastScanByAnimal.set(s.animalId,s);
    });
    const datesBefore=[...new Set(allScans.map(s=>s.scanDate).filter(d=>d<refDate))];
    if(datesBefore.length) prevRoundDate=datesBefore.sort().reverse()[0];
    if(prevRoundDate){
      const recent=[...lastScanByAnimal.entries()]
        .filter(([id,last])=>byId.has(id)&&last.scanDate===prevRoundDate)
        .sort((a,b)=>get拡4(byId.get(a[0]).tagId).localeCompare(get拡4(byId.get(b[0]).tagId)))
        .slice(0,ROW_COUNT)
        .map(([id,last])=>({a:byId.get(id),last}));
      recent.forEach(({a,last},i)=>{
        const age=a.birthDate?calcAge(a.birthDate,NS.date):null;
        const lastHutch=last?(last.hutchId?(notesHutches.find(hh=>hh.id===last.hutchId)?.label||last.hutchId):last.hutchFree||''):'';
        rows.push({no:i+1,tag:a.tagId,age,lastHutch,prefillScore:last?last.obScore:null,prevDate:last?last.scanDate:'',round:last?last.round+1:1});
      });
    }
    while(rows.length<ROW_COUNT)rows.push({no:rows.length+1});
  } else {
    for(let i=0;i<ROW_COUNT;i++)rows.push({no:i+1});
  }

  // ソート適用
  if(NS.sort&&NS.sortDir>0){
    const filled=rows.filter(r=>r.tag);
    const empty=rows.filter(r=>!r.tag);
    const d=NS.sortDir===1?1:-1;
    filled.sort((a,b)=>{
      switch(NS.sort){
        case 'exp4':   return get拡4(a.tag).localeCompare(get拡4(b.tag))*d;
        case 'tagId':  return a.tag.localeCompare(b.tag)*d;
        case 'age':    return ((a.age??9999)-(b.age??9999))*d;
        case 'hutch':  return (a.lastHutch||'').localeCompare(b.lastHutch||'',undefined,{numeric:true,sensitivity:'base'})*d;
        case 'round':  return ((a.round||0)-(b.round||0))*d;
        case 'score':  return ((a.prefillScore??-1)-(b.prefillScore??-1))*d;
        default:return 0;
      }
    });
    [...filled,...empty].forEach((r,i)=>{r.no=i+1;});
    rows.splice(0,rows.length,...filled,...empty);
  }

  // ソートヘッダーヘルパー
  const nsIc=col=>NS.sort===col?(NS.sortDir===1?'<span class="ns-ic">▲</span>':'<span class="ns-ic">▼</span>'):'<span class="ns-ic">⇅</span>';
  const nsTh=(col,label,extra='')=>`<th rowspan="2" class="note-th-sort${NS.sort===col?(NS.sortDir===1?' ns-asc':' ns-desc'):''}" onclick="App.sortNotes('${col}')" ${extra}>${label}${nsIc(col)}</th>`;

  const lobeHdR=['葉①<br>右前-前','葉②<br>右前-後','葉③<br>右中','葉④<br>右後'];
  const lobeHdL=['葉⑤<br>左前-前','葉⑥<br>左前-後','葉⑦<br>左後'];

  setView(`
  <div class="page-hd no-print">
    <div class="page-title">野帳（フィールドノート）</div>
    <div class="page-sub">${h(farm.name)}　印刷してそのまま野帳として使用できます</div>
  </div>

  <div class="note-opts no-print">
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
      <input type="checkbox" ${NS.prefill?'checked':''} onchange="NS.prefill=this.checked;renderNotes()" style="width:15px;height:15px">
      前回検査日の個体を自動入力
    </label>
    <div style="display:flex;align-items:center;gap:6px;font-size:13px">
      <span style="color:var(--text-3);font-weight:600">検査日：</span>
      <input type="date" value="${NS.date}" onchange="NS.date=this.value;renderNotes()" style="font-size:13px;padding:5px 8px;border:1.5px solid var(--border-2);border-radius:7px">
    </div>
    <div style="display:flex;align-items:center;gap:6px;font-size:13px">
      <span style="color:var(--text-3);font-weight:600">検査者：</span>
      <input type="text" value="${h(NS.examiner)}" oninput="NS.examiner=this.value;const _e=document.getElementById('note-disp-examiner');if(_e)_e.textContent=NS.examiner||'　'" placeholder="氏名を入力" style="font-size:13px;padding:5px 8px;border:1.5px solid var(--border-2);border-radius:7px;width:130px">
    </div>
    <button class="btn-primary" onclick="window.print()" style="margin-left:auto">🖨 印刷・PDF出力</button>
  </div>
  ${NS.prefill?`<div class="no-print" style="font-size:12px;color:var(--text-3);margin:0 0 12px;line-height:1.5">
    ${prevRoundDate
      ? `前回検査日（自動判定）：${prevRoundDate.replace(/-/g,'/')}（検査日 ${refDate.replace(/-/g,'/')} より前のスキャン日のうち最新）。この日が各個体の最新スキャン日である個体のみを入力します。`
      : `※ 検査日より前のスキャンがデータにないため、個体は自動入力されません。`}
  </div>`:''}

  <div class="note-wrap">
    <div class="note-hd">
      <div>
        <div class="note-hd-title">子牛　肺エコー検診　野帳（CalfScan 7葉方式）</div>
        <div class="note-hd-sub">Ollivett &amp; Buczinski 2016 / UW-Madison CalfScan App 準拠</div>
      </div>
      <div style="display:flex;gap:20px;font-size:11px;opacity:.85">
        <span>農場：${h(farm.name)}</span>
        <span>Pattern：${farm.protocol}</span>
      </div>
    </div>
    <div class="note-meta">
      <div><div class="note-meta-lbl">検査日</div><div class="note-meta-val">${NS.date.replace(/-/g,'/')}</div></div>
      <div><div class="note-meta-lbl">検査者</div><div class="note-meta-val" id="note-disp-examiner">${h(NS.examiner)||'　'}</div></div>
      <div><div class="note-meta-lbl">農場名</div><div class="note-meta-val">${h(farm.name)}</div></div>
      <div><div class="note-meta-lbl">パターン / 代表者</div><div class="note-meta-val">${farm.protocol}　${h(farm.ownerName||'')}</div></div>
    </div>
    <div class="note-legend">
      <div class="note-legend-row">
        <strong>所見コード：</strong>
        <span><strong>A</strong>=正常Aライン</span>
        <span><strong>L</strong>=線状Bライン（スコア影響なし）</span>
        <span><strong>B</strong>=帯状Bライン/コメット</span>
        <span><strong>C</strong>=局所コンソリ（≥1cm²）</span>
        <span><strong>D</strong>=びまん性コンソリ（葉全体）</span>
        <span><strong>H</strong>=肝変化</span>
        <span><strong>E</strong>=胸水</span>
        <span><strong>P</strong>=膿瘍</span>
      </div>
      <div class="note-legend-score">スコア：0=正常・線状B　1=帯状B(コメット)　2=局所C(≥1cm²)　3=びまんC1葉　4=2葉　5=3葉以上・肝変化・胸水・膿瘍</div>
    </div>
    <div class="note-tbl-wrap">
      <table class="note-tbl">
        <thead>
          <tr>
            <th rowspan="2" style="width:24px">No</th>
            ${nsTh('exp4','拡大<br>4桁','style="width:36px"')}
            ${nsTh('tagId','個体識別番号','style="width:80px"')}
            ${nsTh('age','日齢','style="width:30px"')}
            ${nsTh('hutch','場所','style="min-width:50px"')}
            ${nsTh('round','検診<br>回数','style="width:28px"')}
            <th colspan="4" class="th-r">右肺 Right</th>
            <th colspan="3" class="th-l">左肺 Left</th>
            ${nsTh('score','前回<br>スコア','class="th-sp" style="width:28px"')}
            <th rowspan="2" style="min-width:60px">主な所見</th>
            <th rowspan="2" style="width:28px">治療<br>○/－</th>
            <th rowspan="2" style="min-width:70px">使用薬・投与量</th>
            <th rowspan="2" style="min-width:60px">備考</th>
          </tr>
          <tr>
            ${lobeHdR.map(l=>`<th class="th-r" style="width:30px">${l}</th>`).join('')}
            ${lobeHdL.map(l=>`<th class="th-l" style="width:30px">${l}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${rows.map(r=>`<tr>
            <td class="td-no">${r.no}</td>
            <td class="td-pre">${r.tag?get拡4(r.tag):''}</td>
            <td class="td-tag">${r.tag?h(r.tag):''}</td>
            <td style="font-size:10px;text-align:center;color:var(--text-2)">${r.age!=null?r.age:''}</td>

            <td></td><td></td><td></td><td></td>

            <td class="td-score" style="color:${r.prefillScore!=null?SC[r.prefillScore]:'var(--text-4)'};font-size:10px">${r.prefillScore!=null?r.prefillScore:''}</td>
            <td class="td-wide"></td>
            <td></td>
            <td class="td-wide"></td>
            <td class="td-wide"></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>
  <div style="margin-top:8px;font-size:10px;color:var(--text-4);text-align:right;padding-right:4px" class="no-print">

// ANIMALS VIEW
let AS={sort:'tagId',sortDir:1,q:''};
const renderAnimals=()=>{
  const fid=DB.activeId();const farm=DB.getFarm(fid);
  if(!fid||!farm){renderHome();return;}
  let animals=DB.getAnimals(fid);
  const scans=DB.getScans(fid);
  const hutches=HutchUtil.get(fid);
  if(AS.q) animals=animals.filter(a=>a.tagId.includes(AS.q)||get拡4(a.tagId).includes(AS.q));
  if(AS.sort==='exp4') AS.sort='tagId';
  if(AS.sort&&AS.sortDir>0){
    const d=AS.sortDir===1?1:-1;
    if(AS.sort==='tagId') animals.sort((a,b)=>get拡4(a.tagId).localeCompare(get拡4(b.tagId))*d);
    else if(AS.sort==='birthDate') animals.sort((a,b)=>(a.birthDate||'').localeCompare(b.birthDate||'')*d);
    else if(AS.sort==='scanCnt'){
      const cnt=a=>scans.filter(s=>s.animalId===a.id).length;
      animals.sort((a,b)=>(cnt(a)-cnt(b))*d);
    }
  }
  const aIc=col=>(AS.sort===col&&AS.sortDir>0)?'':`<span class="tbl-sort-hint">⇅</span>`;
  const mkTh=(col,lbl)=>`<th class="${AS.sort===col&&AS.sortDir>0?(AS.sortDir===1?'sort-asc':'sort-desc'):''}" style="cursor:pointer" onclick="App.sortA('${col}')">${lbl}${aIc(col)}</th>`;

  setView(`
  <div class="page-hd">
    <div class="page-title">個体管理</div>
    <div class="page-sub">${h(farm.name)}　登録 ${DB.getAnimals(fid).length} 頭</div>
  </div>
  <div style="display:flex;justify-content:flex-end;gap:8px;margin-bottom:12px">

    <button class="btn-sm btn-ghost" onclick="App.clrAq()">リセット</button>
    <span style="margin-left:auto;font-size:12px;color:var(--text-3)">${animals.length} 頭表示</span>
  </div>
  ${animals.length===0?`
  <div class="card"><div class="card-body"><div class="empty">
    <div class="empty-icon">🐄</div>
    <h3>個体が登録されていません</h3>
    <p>「個体を登録」から追加するか、スキャン入力で自動登録されます</p>
  </div></div></div>`:`
  <div class="card" style="overflow:hidden"><div class="tbl-wrap"><table>
  <thead><tr>
    ${mkTh('tagId','個体識別番号（10桁）')}
    <th>品種</th><th>性別</th>
    ${mkTh('birthDate','生年月日')}
    ${mkTh('scanCnt','スキャン数')}
    <th>最新スコア</th><th>ハッチ</th><th>操作</th>
  </tr></thead>
  <tbody>${animals.map(a=>{
    const anScans=scans.filter(s=>s.animalId===a.id).sort((x,y)=>x.scanDate.localeCompare(y.scanDate));
    const last=anScans[anScans.length-1];
    const hutchLbl=last?(last.hutchId?(hutches.find(hh=>hh.id===last.hutchId)?.label||last.hutchId):last.hutchFree||''):'';
    return`<tr>
      <td class="tag-cell">${fmtTagId(a.tagId)}</td>

        <button class="btn-sm btn-danger" onclick="App.delAnimal('${a.id}','${h(a.tagId)}')">削除</button>
